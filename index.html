<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-lodging:   #6366f1;
            --color-food:      #f43f5e;
            --color-transport: #10b981;
            --color-activity:  #f59e0b;
            --bg:    #f4f5f7;
            --card:  #ffffff;
            --border:#e4e7ec;
            --text:  #111827;
            --muted: #6b7280;
            --subtle:#9ca3af;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; margin: 0;
        }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity 0.2s, transform 0.2s; }
        .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

        #auth-screen { align-items: center; justify-content: center; background: var(--bg); z-index: 50; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; width: 360px; animation: slideUp 0.35s ease-out both; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .auth-input { display: block; width: 100%; padding: 9px 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 13px; background: #f9fafb; outline: none; }
        .auth-btn { width: 100%; padding: 10px; background: var(--color-lodging); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 12px; font-weight: 600; text-transform: uppercase; cursor: pointer; }

        #groups-screen { background: var(--bg); padding: 0; z-index: 40; overflow-y: auto; }
        .groups-inner { max-width: 560px; margin: 0 auto; padding: 48px 24px 40px; }
        .brand { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; font-style: italic; }
        .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
        .group-card:hover { border-color: #a5b4fc; box-shadow: 0 2px 8px rgba(99,102,241,0.08); }
        .icon-btn { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); }
        .action-submit { width: 100%; padding: 8px; background: var(--text); color: #fff; border: none; border-radius: 9px; font-size: 10px; font-weight: 600; text-transform: uppercase; cursor: pointer; }

        #app-screen { background: var(--bg); padding: 16px 20px; z-index: 30; }
        .grid-main { display: grid; grid-template-columns: 300px 1fr; gap: 14px; flex-grow: 1; min-height: 0; height: calc(100vh - 100px); }
        
        /* SIDEBAR FIXED HEIGHT LOGIC */
        .sidebar { display: flex; flex-direction: column; gap: 12px; height: 100%; min-height: 0; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        
        /* Top Sidebar Card: flexible but contained */
        .chart-card { 
            padding: 14px; 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-height: 0; 
            overflow: hidden; 
        }
        .chart-wrap { height: 120px; display: flex; justify-content: center; flex-shrink: 0; }
        .balance-list { display: flex; flex-direction: column; gap: 5px; overflow-y: hidden; }
        
        /* Slimmer Balance Cards */
        .balance-card { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-radius: 8px; font-size: 11px; }
        .balance-card.owed { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .balance-card.owes { background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239; }
        .balance-card.even { background: #f8fafc; border: 1px solid var(--border); color: var(--muted); }

        /* Form Card: Pinned to Bottom, No Shrinking */
        .form-card { padding: 14px; flex-shrink: 0; }
        .form-field { display: block; width: 100%; padding: 8px 10px; margin-bottom: 8px; background: #f9fafb; border: 1px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 12px; outline: none; }
        .submit-btn { width: 100%; padding: 9px; background: var(--text); color: #fff; border: none; border-radius: 9px; font-size: 10px; font-weight: 600; text-transform: uppercase; cursor: pointer; }

        .right-col { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .table-card { flex-grow: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
        .table-inner { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 10px 16px; font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--subtle); text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); }
        tbody td { padding: 11px 16px; border-bottom: 1px solid #f3f4f6; }

        .rb-modal { position: fixed; inset: 0; z-index: 160; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; }
        .rb-modal.hidden { display: none; }
        .modal-card { background: var(--card); border-radius: 20px; padding: 28px; width: 360px; animation: slideUp 0.2s ease-out both; }

        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 12px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 200; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen">
    <div class="auth-card">
        <h2 class="text-xl font-semibold mb-1">Welcome back</h2>
        <p class="text-sm text-gray-500 mb-6">Sign in to access your trips</p>
        <input class="auth-input" type="email" id="auth-email" placeholder="Email address">
        <input class="auth-input" type="password" id="auth-password" placeholder="Password">
        <button class="auth-btn" id="auth-submit">Sign In</button>
        <div id="auth-error" class="text-xs text-red-500 mt-2"></div>
        <span id="auth-toggle" class="block text-center text-xs mt-4 text-gray-500 cursor-pointer">No account? <span class="text-indigo-600 underline">Create one</span></span>
    </div>
</div>

<div id="profile-screen" class="screen hidden">
    <div class="auth-card">
        <div class="avatar-preview" id="setup-avatar-preview">?</div>
        <h2 class="text-lg font-semibold mb-1 text-center">What's your name?</h2>
        <p class="text-sm text-gray-500 mb-5 text-center">How trip members will see you.</p>
        <div class="color-swatches" id="setup-color-swatches"></div>
        <input class="auth-input" type="text" id="setup-display-name" placeholder="Display name">
        <button class="auth-btn" id="btn-save-profile">Save & Continue</button>
    </div>
</div>

<div id="profile-modal" class="rb-modal hidden">
    <div class="modal-card">
        <h3 class="text-base font-semibold mb-4">Edit Profile</h3>
        <div class="avatar-preview" id="edit-avatar-preview">?</div>
        <div class="color-swatches" id="edit-color-swatches"></div>
        <input class="auth-input" type="text" id="edit-display-name" placeholder="Display name">
        <div class="flex gap-2">
            <button class="auth-btn bg-gray-100 !text-gray-500 flex-1" id="btn-profile-cancel">Cancel</button>
            <button class="auth-btn flex-1" id="btn-save-profile-edit">Save</button>
        </div>
    </div>
</div>

<div id="balance-modal" class="rb-modal hidden">
    <div class="modal-card">
        <h3 class="text-base font-semibold mb-2">Full Balance Sheet</h3>
        <div id="full-balance-list" class="flex flex-col gap-2 max-h-[300px] overflow-y-auto pr-1"></div>
        <button class="auth-btn mt-6 w-full" onclick="document.getElementById('balance-modal').classList.add('hidden')">Close</button>
    </div>
</div>

<div id="groups-screen" class="screen hidden">
    <div class="groups-inner">
        <div class="flex justify-between items-center mb-8">
            <span class="brand">RoamBudget</span>
            <div class="flex items-center gap-3">
                <button class="profile-btn" id="btn-open-profile">?</button>
                <button class="text-[11px] text-gray-400 font-medium" id="btn-logout">Sign Out</button>
            </div>
        </div>
        <div id="groups-list"></div>
        <div class="grid grid-cols-2 gap-3 mt-8">
            <div class="bg-white border p-4 rounded-xl">
                <h4 class="text-[10px] font-bold uppercase text-gray-400 mb-2">Create</h4>
                <input class="auth-input text-xs" id="new-trip-code" placeholder="Trip code">
                <button class="action-submit" id="btn-create-trip">Create</button>
            </div>
            <div class="bg-white border p-4 rounded-xl">
                <h4 class="text-[10px] font-bold uppercase text-gray-400 mb-2">Join</h4>
                <input class="auth-input text-xs" id="join-trip-code" placeholder="Enter code">
                <button class="action-submit secondary" id="btn-join-trip">Join</button>
            </div>
        </div>
    </div>
</div>

<div id="app-screen" class="screen hidden">
    <div class="flex justify-between items-center mb-4 flex-shrink-0">
        <div class="flex items-center gap-3">
            <button class="text-xs border px-3 py-1 rounded-lg text-gray-500" id="btn-back">← Back</button>
            <span class="font-mono text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded" id="display-trip-id">—</span>
        </div>
        <div class="bg-gray-900 text-white px-4 py-2 rounded-xl text-right">
            <div class="text-[9px] opacity-50 uppercase font-bold">Trip Total</div>
            <div class="text-2xl font-semibold tracking-tighter" id="total-cost">$0.00</div>
        </div>
    </div>

    <div class="grid-main">
        <div class="sidebar">
            <div class="card chart-card">
                <div class="chart-wrap"><canvas id="budgetChart"></canvas></div>
                <div class="flex justify-between items-end mt-4 mb-2">
                    <div class="text-[9px] font-bold uppercase text-gray-400">Balances</div>
                    <button id="btn-view-all-balances" class="text-[9px] font-bold text-indigo-600 uppercase hover:underline hidden" onclick="document.getElementById('balance-modal').classList.remove('hidden')">View All</button>
                </div>
                <div class="balance-list" id="settle-up-list"></div>
            </div>
            <div class="card form-card">
                <h3 class="text-[10px] font-bold uppercase text-gray-400 mb-2">New Expense</h3>
                <form id="expense-form">
                    <input class="form-field" type="text" id="item_name" placeholder="Item name" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input class="form-field" type="number" id="amount" step="0.01" placeholder="$ Price" required>
                        <select class="form-field" id="category">
                            <option value="Lodging">🏨 Lodging</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">✈️ Transport</option>
                            <option value="Activity">🎟️ Activity</option>
                        </select>
                    </div>
                    <input class="form-field" type="text" id="paid_by" placeholder="Who paid?" required>
                    <input class="form-field" type="number" id="split_count" min="1" placeholder="Split count" required>
                    <button type="submit" class="submit-btn" id="btn-submit">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="right-col">
            <div class="flex items-center gap-3">
                <span class="text-[9px] font-bold uppercase text-gray-400">Members</span>
                <div id="member-strip" class="flex gap-2"></div>
            </div>
            <div id="category-summary" class="flex flex-wrap gap-2"></div>
            <div class="card table-card">
                <div class="table-inner">
                    <table>
                        <thead><tr><th>Expense</th><th>Category</th><th class="text-right">Amount</th><th class="w-10"></th></tr></thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co";
const SB_KEY = "YOUR_SUPABASE_ANON_KEY"; 
const API_URL = "https://roambudget-server.onrender.com/expenses";
const AVATAR_COLORS = ["#6366f1","#f43f5e","#10b981","#f59e0b","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
const CAT_COLORS = { Lodging: "#6366f1", Food: "#f43f5e", Transport: "#10b981", Activity: "#f59e0b" };

const sb = supabase.createClient(SB_URL, SB_KEY);
let currentDisplayName = "", currentAvatarColor = AVATAR_COLORS[0], currentSession = null, currentTripId = null, myChart = null, isSignUp = false;

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500); }
function getInitials(n) { return n ? n.split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2) : "?"; }

async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentSession = session;
        const meta = session.user.user_metadata || {};
        currentDisplayName = meta.display_name || "";
        currentAvatarColor = meta.avatar_color || AVATAR_COLORS[0];
        updateUIProfile();
        if (!currentDisplayName) { initSwatches("setup"); showScreen("profile-screen"); }
        else { showScreen("groups-screen"); loadGroups(); }
    } else showScreen("auth-screen");
}

function initSwatches(ctx) {
    const container = document.getElementById(`${ctx}-color-swatches`), preview = document.getElementById(`${ctx}-avatar-preview`);
    container.innerHTML = "";
    AVATAR_COLORS.forEach(c => {
        const s = document.createElement("div"); 
        s.className = "swatch" + (c === currentAvatarColor ? " active" : ""); 
        s.style.background = c;
        s.onclick = () => { currentAvatarColor = c; container.querySelectorAll(".swatch").forEach(x => x.classList.remove("active")); s.classList.add("active"); preview.style.background = c; };
        container.appendChild(s);
    });
}

async function saveProfile(name, color) {
    if (!name.trim()) return false;
    await sb.auth.updateUser({ data: { display_name: name.trim(), avatar_color: color } });
    currentDisplayName = name.trim(); currentAvatarColor = color;
    updateUIProfile();
    return true;
}

function updateUIProfile() { 
    const b = document.getElementById("btn-open-profile"); 
    b.textContent = getInitials(currentDisplayName); 
    b.style.background = currentAvatarColor; 
}

document.getElementById("btn-save-profile").onclick = async () => { if (await saveProfile(document.getElementById("setup-display-name").value, currentAvatarColor)) { showScreen("groups-screen"); loadGroups(); } };
document.getElementById("btn-open-profile").onclick = () => { document.getElementById("edit-display-name").value = currentDisplayName; initSwatches("edit"); document.getElementById("profile-modal").classList.remove("hidden"); };
document.getElementById("btn-profile-cancel").onclick = () => document.getElementById("profile-modal").classList.add("hidden");
document.getElementById("btn-save-profile-edit").onclick = async () => { if (await saveProfile(document.getElementById("edit-display-name").value, currentAvatarColor)) { document.getElementById("profile-modal").classList.add("hidden"); } };

async function loadGroups() {
    const { data } = await sb.from("trip_members").select("trip_id, trips(id, trip_code, name, creator_id)").eq("user_id", currentSession.user.id);
    const list = document.getElementById("groups-list"); list.innerHTML = "";
    data?.forEach(r => {
        const t = r.trips;
        list.insertAdjacentHTML("beforeend", `<div class="group-card" onclick="enterTrip('${t.trip_code}','${t.name||t.trip_code}')"><div class="font-semibold text-sm">${t.name||t.trip_code}</div><button class="icon-btn">→</button></div>`);
    });
}

document.getElementById("btn-create-trip").onclick = async () => {
    const code = document.getElementById("new-trip-code").value.toUpperCase();
    const { data } = await sb.from("trips").insert({ trip_code: code, creator_id: currentSession.user.id }).select().single();
    await sb.from("trip_members").insert({ trip_id: data.id, user_id: currentSession.user.id, display_name: currentDisplayName, avatar_color: currentAvatarColor });
    loadGroups();
};

document.getElementById("btn-join-trip").onclick = async () => {
    const code = document.getElementById("join-trip-code").value.toUpperCase();
    const { data } = await sb.from("trips").select("id").eq("trip_code", code).single();
    await sb.from("trip_members").insert({ trip_id: data.id, user_id: currentSession.user.id, display_name: currentDisplayName, avatar_color: currentAvatarColor });
    loadGroups();
};

async function enterTrip(c, n) { currentTripId = c; document.getElementById("display-trip-id").textContent = n; showScreen("app-screen"); fetchEx(); loadMemberStrip(); }
document.getElementById("btn-back").onclick = () => { showScreen("groups-screen"); loadGroups(); };

async function loadMemberStrip() {
    const s = document.getElementById("member-strip");
    const { data: trip } = await sb.from("trips").select("id").eq("trip_code", currentTripId).single();
    const { data: members } = await sb.from("trip_members").select("user_id, display_name, avatar_color").eq("trip_id", trip.id);
    s.innerHTML = "";
    members.forEach(m => {
        s.insertAdjacentHTML("beforeend", `<div class="bg-white border rounded-full px-2 py-0.5 text-[10px] font-medium flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background:${m.avatar_color}"></div>${m.display_name}</div>`);
    });
}

async function fetchEx() {
    const res = await fetch(`${API_URL}/${currentTripId}`, { headers: { "Authorization": `Bearer ${currentSession.access_token}` } });
    const data = await res.json(); renderUI(data);
}

function renderUI(exps) {
    const table = document.getElementById("expense-table-body"), 
          settle = document.getElementById("settle-up-list"), 
          fullSettle = document.getElementById("full-balance-list"),
          viewAllBtn = document.getElementById("btn-view-all-balances"),
          totalEl = document.getElementById("total-cost");

    table.innerHTML = ""; settle.innerHTML = ""; fullSettle.innerHTML = "";
    let total = 0, cats = {}, bals = {};
    
    exps.forEach(e => {
        const a = parseFloat(e.amount), s = parseInt(e.split_count)||1, p = a/s;
        total += a; cats[e.category] = (cats[e.category]||0) + a;
        if (!bals[e.paid_by]) bals[e.paid_by] = { p: 0, o: 0 };
        bals[e.paid_by].p += a; bals[e.paid_by].o += p;
        table.insertAdjacentHTML("beforeend", `<tr><td><div class="text-xs font-medium">${e.item_name}</div></td><td><span class="text-[9px] font-bold uppercase" style="color:${CAT_COLORS[e.category]}">${e.category}</span></td><td class="text-right font-mono text-xs">$${a.toFixed(2)}</td></tr>`);
    });
    
    totalEl.textContent = `$${total.toFixed(2)}`;
    const balanceEntries = Object.entries(bals);
    
    // VIEW ALL LOGIC: Clamp to 2 for small sidebars
    if (balanceEntries.length > 2) viewAllBtn.classList.remove('hidden');
    else viewAllBtn.classList.add('hidden');

    balanceEntries.forEach(([n, b], index) => {
        const net = b.p - b.o, abs = Math.abs(net);
        const html = `<div class="balance-card ${net>=0?'owed':'owes'}"><div><div class="font-bold">${n}</div><div class="text-[9px] opacity-70">${net>=0?'is owed':'owes'}</div></div><span class="font-mono">$${abs.toFixed(2)}</span></div>`;
        if (index < 2) settle.insertAdjacentHTML("beforeend", html);
        fullSettle.insertAdjacentHTML("beforeend", html);
    });
    
    updateC(cats);
}

function updateC(cats) {
    const ctx = document.getElementById("budgetChart").getContext("2d"); if (myChart) myChart.destroy();
    const l = Object.keys(cats); if (!l.length) return;
    myChart = new Chart(ctx, { type: "doughnut", data: { labels: l, datasets: [{ data: Object.values(cats), backgroundColor: l.map(x => CAT_COLORS[x]), borderWidth: 0 }] }, options: { cutout: "80%", plugins: { legend: { display: false } } } });
}

document.getElementById("expense-form").onsubmit = async e => {
    e.preventDefault();
    const payload = { item_name: document.getElementById("item_name").value, amount: parseFloat(document.getElementById("amount").value), category: document.getElementById("category").value, paid_by: document.getElementById("paid_by").value, split_count: parseInt(document.getElementById("split_count").value), trip_id: currentTripId };
    await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${currentSession.access_token}` }, body: JSON.stringify(payload) });
    e.target.reset(); fetchEx();
};

document.getElementById("auth-submit").onclick = async () => {
    const email = document.getElementById("auth-email").value, pass = document.getElementById("auth-password").value;
    const { data } = await sb.auth.signInWithPassword({ email, password: pass });
    init();
};

init();
</script>
</body>
</html>
