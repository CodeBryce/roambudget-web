<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-lodging:   #6366f1;
            --color-food:      #f43f5e;
            --color-transport: #10b981;
            --color-activity:  #f59e0b;
            --bg:    #f4f5f7;
            --card:  #ffffff;
            --border:#e4e7ec;
            --text:  #111827;
            --muted: #6b7280;
            --subtle:#9ca3af;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; margin: 0;
        }

        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            transition: opacity 0.2s, transform 0.2s;
        }
        .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

        /* Auth */
        #auth-screen { align-items: center; justify-content: center; background: var(--bg); z-index: 50; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; width: 360px; animation: slideUp 0.35s ease-out both; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .auth-card h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 4px; }
        .auth-card p  { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
        .auth-input { display: block; width: 100%; padding: 9px 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 13px; background: #f9fafb; outline: none; transition: border-color 0.15s; }
        .auth-input:focus { border-color: var(--color-lodging); }
        .auth-btn { width: 100%; padding: 10px; background: var(--color-lodging); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
        .auth-btn:hover { background: #4f46e5; }
        #auth-toggle { display: block; text-align: center; margin-top: 14px; font-size: 12px; color: var(--muted); cursor: pointer; }
        #auth-toggle span { color: var(--color-lodging); text-decoration: underline; }
        #auth-error { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 16px; }

        /* Groups Home */
        #groups-screen { background: var(--bg); padding: 0; z-index: 40; overflow-y: auto; }
        .groups-inner { max-width: 560px; margin: 0 auto; padding: 48px 24px 40px; }
        .groups-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .brand { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; font-style: italic; }
        .ghost-btn { font-size: 11px; font-weight: 500; color: var(--subtle); background: none; border: none; cursor: pointer; font-family: inherit; transition: color 0.15s; }
        .ghost-btn:hover { color: #ef4444; }
        .groups-section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); margin-bottom: 10px; }

        .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
        .group-card:hover { border-color: #a5b4fc; box-shadow: 0 2px 8px rgba(99,102,241,0.08); }
        .group-card-left { display: flex; flex-direction: column; gap: 3px; }
        .group-card-name { font-size: 14px; font-weight: 600; letter-spacing: -0.1px; }
        .group-card-meta { font-size: 11px; color: var(--muted); }
        .group-card-right { display: flex; align-items: center; gap: 8px; }
        .creator-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 5px; background: #eef2ff; color: var(--color-lodging); }
        .group-actions { display: flex; gap: 4px; }
        .icon-btn { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); transition: all 0.15s; }
        .icon-btn:hover.leave  { border-color: #fca5a5; color: #ef4444; background: #fff1f2; }
        .icon-btn:hover.delete { border-color: #fca5a5; color: #ef4444; background: #fff1f2; }
        .icon-btn:hover.enter  { border-color: #a5b4fc; color: var(--color-lodging); background: #eef2ff; }

        .action-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 28px; }
        .action-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
        .action-card h4 { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }
        .action-input { display: block; width: 100%; padding: 8px 10px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 12px; background: #f9fafb; outline: none; transition: border-color 0.15s; color: var(--text); }
        .action-input:focus { border-color: var(--color-lodging); }
        .action-submit { width: 100%; padding: 8px; background: var(--text); color: #fff; border: none; border-radius: 9px; font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
        .action-submit:hover { opacity: 0.8; }
        .action-submit.secondary { background: #eef2ff; color: var(--color-lodging); }
        .action-submit.secondary:hover { background: #e0e7ff; opacity: 1; }

        /* Dashboard */
        #app-screen { background: var(--bg); padding: 16px 20px; z-index: 30; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-shrink: 0; }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .back-btn { font-size: 11px; font-weight: 500; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .back-btn:hover { border-color: #a5b4fc; color: var(--color-lodging); }
        .trip-badge { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; background: #eef2ff; color: var(--color-lodging); padding: 3px 8px; border-radius: 6px; letter-spacing: 0.04em; }
        .total-pill { background: var(--text); color: #fff; padding: 8px 18px; border-radius: 14px; display: flex; flex-direction: column; align-items: flex-end; }
        .total-pill .label { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.5; }
        .total-pill .amount { font-size: 26px; font-weight: 600; letter-spacing: -1px; line-height: 1; }

        /* Sidebar Slider Fix (Goal B) */
        .grid-main { display: grid; grid-template-columns: 300px 1fr; gap: 14px; flex-grow: 1; min-height: 0; }
        .sidebar { display: flex; flex-direction: column; gap: 12px; overflow: hidden; height: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        
        /* Adjusted heights to prevent form cutoff */
        .chart-card { padding: 16px; flex-shrink: 1; min-height: 0; display: flex; flex-direction: column; }
        .chart-wrap { height: 120px; flex-shrink: 0; display: flex; justify-content: center; } /* Reduced from 140 */

        .section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); margin-bottom: 8px; }

        .balance-list { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; overflow-y: auto; } /* flex-grow instead of max-height */
        .balance-list::-webkit-scrollbar { width: 3px; }
        .balance-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .balance-card { display: flex; justify-content: space-between; align-items: center; padding: 8px 11px; border-radius: 10px; font-size: 11px; flex-shrink: 0; }
        .balance-card.owed { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .balance-card.owes { background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239; }
        .balance-card.even { background: #f8fafc; border: 1px solid var(--border); color: var(--muted); }
        .balance-card .bname { font-weight: 600; letter-spacing: 0.02em; }
        .balance-card .bval  { font-family: 'DM Mono', monospace; font-size: 11px; }
        .balance-card .bsub  { font-size: 9px; opacity: 0.7; }

        .form-card { padding: 14px; flex-shrink: 0; }
        .form-card h3 { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }
        .form-field { display: block; width: 100%; padding: 8px 10px; margin-bottom: 8px; background: #f9fafb; border: 1px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 12px; color: var(--text); outline: none; transition: border-color 0.15s; }
        .form-field:focus { border-color: var(--color-lodging); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .form-grid .form-field { margin-bottom: 0; }
        .submit-btn { width: 100%; padding: 9px; background: var(--text); color: #fff; border: none; border-radius: 9px; font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
        .submit-btn:hover  { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.45; cursor: default; }

        .right-col { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .cat-pills { display: flex; flex-wrap: wrap; gap: 7px; flex-shrink: 0; }
        .cat-pill { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 10px; font-weight: 500; color: var(--muted); white-space: nowrap; }
        .cat-amt { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }

        .table-card { flex-grow: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
        .table-inner { overflow-y: auto; flex-grow: 1; }
        .table-inner::-webkit-scrollbar { width: 4px; }
        .table-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 10px 16px; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); }
        thead th:last-child { text-align: right; }
        tbody td { padding: 11px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        .exp-name { font-size: 13px; font-weight: 500; letter-spacing: -0.1px; }
        .exp-paidby { font-size: 10px; color: var(--subtle); margin-top: 1px; }
        .cat-tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
        .tag-Lodging   { background: #eef2ff; color: #4f46e5; }
        .tag-Food      { background: #fff1f2; color: #e11d48; }
        .tag-Transport { background: #f0fdf4; color: #059669; }
        .tag-Activity  { background: #fffbeb; color: #d97706; }
        .exp-amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; text-align: right; }
        .exp-split { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--color-lodging); font-style: italic; text-align: right; }
        .delete-btn { background: none; border: none; cursor: pointer; color: #d1d5db; padding: 4px 6px; border-radius: 6px; font-size: 13px; line-height: 1; transition: all 0.15s; }
        .delete-btn:hover { color: #ef4444; background: #fff1f2; }

        /* Profile & Modals */
        #confirm-modal, #profile-modal { position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
        .confirm-card, .profile-modal-card { background: var(--card); border-radius: 16px; padding: 28px 26px; width: 320px; animation: slideUp 0.2s ease-out both; }
        .avatar-preview { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #fff; margin: 0 auto 20px; background: var(--color-lodging); }
        .color-swatches { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: var(--text); }
        .profile-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; border: none; cursor: pointer; background: var(--color-lodging); }
        .member-chip { display: flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px 3px 4px; font-size: 11px; font-weight: 500; }
        .member-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; }
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 12px; opacity: 0; transition: opacity 0.2s; z-index: 200; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen">
    <div class="auth-card">
        <h2 id="auth-title">Welcome back</h2>
        <p id="auth-subtitle">Sign in to access your trips</p>
        <input class="auth-input" type="email"    id="auth-email"    placeholder="Email address">
        <input class="auth-input" type="password" id="auth-password" placeholder="Password">
        <button class="auth-btn" id="auth-submit">Sign In</button>
        <div id="auth-error"></div>
        <span id="auth-toggle">No account? <span id="auth-toggle-link">Create one</span></span>
    </div>
</div>

<div id="profile-screen" class="screen hidden">
    <div class="profile-card">
        <div class="avatar-preview" id="setup-avatar-preview">?</div>
        <h2>What's your name?</h2>
        <p>This is how other trip members will see you.</p>
        <div class="color-swatches" id="setup-color-swatches"></div>
        <input class="auth-input" type="text" id="setup-display-name" placeholder="Display name" maxlength="32">
        <button class="auth-btn" id="btn-save-profile">Save & Continue</button>
        <div id="setup-error"></div>
    </div>
</div>

<div id="groups-screen" class="screen hidden">
    <div class="groups-inner">
        <div class="groups-header">
            <span class="brand">RoamBudget</span>
            <div style="display:flex;align-items:center;gap:10px;">
                <button class="profile-btn" id="btn-open-profile">?</button>
                <button class="ghost-btn" id="btn-logout">Sign Out</button>
            </div>
        </div>
        <div class="groups-section-label">Your Trips</div>
        <div id="groups-list"></div>
        <div class="action-cards">
            <div class="action-card">
                <h4>Create Trip</h4>
                <input class="action-input" id="new-trip-code"  placeholder="Trip code (e.g. PARIS2026)">
                <input class="action-input" id="new-trip-name"  placeholder="Display name (optional)">
                <button class="action-submit" id="btn-create-trip">Create</button>
            </div>
            <div class="action-card">
                <h4>Join Trip</h4>
                <input class="action-input" id="join-trip-code" placeholder="Enter trip code">
                <button class="action-submit secondary" id="btn-join-trip">Join</button>
            </div>
        </div>
    </div>
</div>

<div id="app-screen" class="screen hidden">
    <div class="topbar">
        <div class="topbar-left">
            <button class="back-btn" id="btn-back">← My Trips</button>
            <span class="trip-badge" id="display-trip-id">—</span>
            <button class="ghost-btn" id="btn-logout-dash">Sign Out</button>
        </div>
        <div class="total-pill">
            <span class="label">Trip Total</span>
            <span class="amount" id="total-cost">$0.00</span>
        </div>
    </div>

    <div class="grid-main">
        <div class="sidebar">
            <div class="card chart-card">
                <div class="chart-wrap"><canvas id="budgetChart"></canvas></div>
                <div class="section-label" style="margin-top:14px;">Balance Sheet</div>
                <div class="balance-list" id="settle-up-list"></div>
            </div>
            <div class="card form-card">
                <h3>Post New Expense</h3>
                <form id="expense-form">
                    <input class="form-field" type="text" id="item_name" placeholder="Item name" required>
                    <div class="form-grid">
                        <input class="form-field" type="number" id="amount" step="0.01" min="0.01" placeholder="$ Price" required>
                        <select class="form-field" id="category">
                            <option value="Lodging">🏨 Lodging</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">✈️ Transport</option>
                            <option value="Activity">🎟️ Activity</option>
                        </select>
                    </div>
                    <input class="form-field" type="text" id="paid_by" placeholder="Who paid?" required>
                    <input class="form-field" type="number" id="split_count" min="1" placeholder="Split count" required>
                    <button type="submit" class="submit-btn" id="btn-submit">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="right-col">
            <div style="display:flex;align-items:center;gap:10px;"><span class="member-strip-label">Members</span><div class="member-strip" id="member-strip"></div></div>
            <div class="cat-pills" id="category-summary"></div>
            <div class="card table-card">
                <div class="table-inner">
                    <table>
                        <thead><tr><th>Expense</th><th>Category</th><th style="text-align:right;">Amount</th><th style="width:40px;"></th></tr></thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const SB_URL  = "https://nlxpcmogqbbmpnowfwhi.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5seHBjbW9ncWJibXBub3dmd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTU4MTEsImV4cCI6MjA4OTQzMTgxMX0.37Eqm_8T4QfMKz3qzX6-kGFUz5xOfEIwmP6YEIp1jNQ"; 
const API_URL = "https://roambudget-server.onrender.com/expenses";
const TRIPS_API = "https://roambudget-server.onrender.com/trips";

const AVATAR_COLORS = ["#6366f1","#f43f5e","#10b981","#f59e0b","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
const CAT_COLORS = { Lodging: "#6366f1", Food: "#f43f5e", Transport: "#10b981", Activity: "#f59e0b" };

const sb = supabase.createClient(SB_URL, SB_KEY);
let myChart = null, currentTripId = null, currentSession = null, currentDisplayName = "", currentAvatarColor = AVATAR_COLORS[0];

function showScreen(id) { ["auth-screen","profile-screen","groups-screen","app-screen"].forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id)); }
function toast(msg) { const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2500); }
function getInitials(name) { return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) || "?"; }

async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentSession = session;
        const meta = session.user.user_metadata || {};
        currentDisplayName = meta.display_name || "";
        currentAvatarColor = meta.avatar_color || AVATAR_COLORS[0];
        if (!currentDisplayName) { initColorSwatches("setup"); showScreen("profile-screen"); }
        else { showScreen("groups-screen"); loadGroups(); }
    } else { showScreen("auth-screen"); }
}

// GOAL A: Proper Balance Math based on split_count
function renderUI(expenses) {
    const tableBody = document.getElementById("expense-table-body"), settleList = document.getElementById("settle-up-list"), summaryDiv = document.getElementById("category-summary"), totalDisplay = document.getElementById("total-cost");
    tableBody.innerHTML = ""; settleList.innerHTML = ""; summaryDiv.innerHTML = "";

    if (expenses.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4"><div class="empty-state">No expenses yet.</div></td></tr>`;
        totalDisplay.textContent = "$0.00";
        updateChart({});
        return;
    }

    let total = 0, catTotals = {}, balances = {};

    expenses.forEach(exp => {
        const amt = parseFloat(exp.amount), splits = parseInt(exp.split_count) || 1, perPerson = amt / splits;
        total += amt;
        catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;

        if (!balances[exp.paid_by]) balances[exp.paid_by] = { paid: 0, owed: 0 };
        balances[exp.paid_by].paid += amt;
        balances[exp.paid_by].owed += perPerson; // The payer also owes their share of the expense

        tableBody.insertAdjacentHTML("beforeend", `
            <tr>
                <td><div class="exp-name">${exp.item_name}</div><div class="exp-paidby">By ${exp.paid_by}</div></td>
                <td><span class="cat-tag tag-${exp.category}">${exp.category}</span></td>
                <td><div class="exp-amount">$${amt.toFixed(2)}</div><div class="exp-split">$${perPerson.toFixed(2)} / person</div></td>
                <td style="text-align:right;"><button class="delete-btn" onclick="deleteExpense(${exp.id})">✕</button></td>
            </tr>`);
    });

    totalDisplay.textContent = `$${total.toFixed(2)}`;
    updateChart(catTotals);

    // Render Pills
    for (const [cat, sum] of Object.entries(catTotals)) {
        summaryDiv.insertAdjacentHTML("beforeend", `<div class="cat-pill"><span style="background:${CAT_COLORS[cat]};"></span>${cat}: <span class="cat-amt">$${sum.toFixed(2)}</span></div>`);
    }

    // Render Balance Sheet
    const entries = Object.entries(balances).map(([name, b]) => ({ name, net: b.paid - b.owed })).sort((a,b) => b.net - a.net);
    entries.forEach(({ name, net }) => {
        const absNet = Math.abs(net);
        const cls = net > 0.01 ? "owed" : (net < -0.01 ? "owes" : "even");
        const label = net > 0.01 ? "is owed" : (net < -0.01 ? "owes" : "Settled");
        settleList.insertAdjacentHTML("beforeend", `
            <div class="balance-card ${cls}">
                <div><div class="bname">${name}</div><div class="bsub">${label}</div></div>
                <span class="bval">${net === 0 ? "—" : (net > 0 ? "+" : "-") + "$" + absNet.toFixed(2)}</span>
            </div>`);
    });
}

// BOILERPLATE LOGIC (CHART, AUTH, CRUD)
function updateChart(catTotals) {
    const ctx = document.getElementById("budgetChart").getContext("2d");
    if (myChart) myChart.destroy();
    const labels = Object.keys(catTotals);
    if (!labels.length) return;
    myChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data: Object.values(catTotals), backgroundColor: labels.map(l => CAT_COLORS[l]), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom", labels: { boxWidth: 7, font: { size: 9 } } } }, cutout: "78%" }
    });
}

document.getElementById("auth-submit").onclick = async () => {
    const email = document.getElementById("auth-email").value, password = document.getElementById("auth-password").value;
    const { data, error } = isSignUp ? await sb.auth.signUp({ email, password }) : await sb.auth.signInWithPassword({ email, password });
    if (error) { document.getElementById("auth-error").textContent = error.message; return; }
    currentSession = data.session; init();
};

document.getElementById("auth-toggle").onclick = () => { isSignUp = !isSignUp; document.getElementById("auth-submit").textContent = isSignUp ? "Sign Up" : "Sign In"; };

async function loadGroups() {
    const { data, error } = await sb.from("trip_members").select("trip_id, trips(*)").eq("user_id", currentSession.user.id);
    const list = document.getElementById("groups-list"); list.innerHTML = "";
    data.forEach(row => {
        const trip = row.trips, name = trip.name || trip.trip_code;
        list.insertAdjacentHTML("beforeend", `<div class="group-card" onclick="enterTrip('${trip.trip_code}', '${name}')"><div class="group-card-left"><div class="group-card-name">${name}</div><div class="group-card-meta">${trip.trip_code}</div></div><div class="group-card-right">→</div></div>`);
    });
}

async function enterTrip(code, name) { currentTripId = code; document.getElementById("display-trip-id").textContent = name; showScreen("app-screen"); fetchExpenses(); }
async function fetchExpenses() { const res = await fetch(`${API_URL}/${currentTripId}`, { headers: {"Authorization": `Bearer ${currentSession.access_token}`} }); const data = await res.json(); renderUI(data); }

document.getElementById("expense-form").onsubmit = async e => {
    e.preventDefault();
    const payload = { item_name: document.getElementById("item_name").value, amount: parseFloat(document.getElementById("amount").value), category: document.getElementById("category").value, paid_by: document.getElementById("paid_by").value, split_count: parseInt(document.getElementById("split_count").value), trip_id: currentTripId };
    await fetch(API_URL, { method: "POST", headers: {"Content-Type": "application/json", "Authorization": `Bearer ${currentSession.access_token}`}, body: JSON.stringify(payload) });
    e.target.reset(); fetchExpenses();
};

document.getElementById("btn-back").onclick = () => showScreen("groups-screen");

init();
</script>
