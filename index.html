<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Shared Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
        .auth-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; width: 24px; height: 24px; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white">
        <div class="spinner mb-4"></div>
        <p class="font-bold tracking-wide animate-pulse">Syncing Cloud Data...</p>
    </div>

    <div class="max-w-6xl mx-auto">
        
        <div id="auth-container" class="auth-card bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-20">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-indigo-600 tracking-tight">✈️ RoamBudget</h2>
                <p class="text-slate-500 mt-2 text-sm font-medium">Sign in to start tracking.</p>
            </div>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" placeholder="Email" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="password" placeholder="Password" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-md">Login</button>
                <button type="button" id="btn-signup" class="w-full border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-lg hover:bg-indigo-50 transition">Create Account</button>
            </form>
            <p id="auth-msg" class="text-center text-sm mt-4 text-red-500 font-medium h-4"></p>
        </div>

        <div id="trip-selection-container" class="hidden auth-card bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-20">
            <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Select a Trip</h2>
            <form id="trip-id-form" class="space-y-4">
                <input type="text" id="input-trip-id" placeholder="TRIP CODE" required class="w-full p-4 bg-slate-50 border-2 border-dashed rounded-xl outline-none focus:border-indigo-500 text-center font-bold uppercase tracking-widest">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition">Enter Trip Dashboard</button>
            </form>
        </div>

        <div id="app-container" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 tracking-tight">RoamBudget</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="display-trip-id" class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded font-bold text-[10px] uppercase tracking-tighter"></span>
                        <button id="btn-change-trip" class="text-[10px] text-slate-400 font-bold uppercase hover:text-indigo-600 underline">Switch Trip</button>
                        <button id="btn-logout" class="text-xs text-red-400 hover:text-red-600 font-bold uppercase tracking-widest border-l pl-2">Sign Out</button>
                    </div>
                </div>
                <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-2xl text-center min-w-[260px]">
                    <p class="text-xs uppercase tracking-widest font-bold opacity-80">Trip Total</p>
                    <h2 id="total-cost" class="text-5xl font-black mt-1">$0.00</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <canvas id="budgetChart" class="max-h-[180px] mb-6"></canvas>
                        <hr class="mb-4 border-slate-100">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Balance Sheet</h3>
                        <div id="settle-up-list" class="space-y-3"></div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-lg font-bold mb-4">New Shared Expense</h3>
                        <form id="expense-form" class="space-y-4">
                            <input type="text" id="item_name" placeholder="Item Name" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="amount" step="0.01" placeholder="$ Price" required class="p-3 bg-slate-50 border rounded-xl outline-none">
                                <select id="category" class="p-3 bg-slate-50 border rounded-xl outline-none">
                                    <option value="Lodging">🏨 Lodging</option>
                                    <option value="Food">🍔 Food</option>
                                    <option value="Transport">✈️ Transport</option>
                                    <option value="Activity">🎟️ Activity</option>
                                </select>
                            </div>
                            <input type="text" id="paid_by" placeholder="Who paid? (Exact Name)" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                            <div class="flex items-center gap-3 p-3 bg-indigo-50 rounded-xl">
                                <span class="text-xs font-bold text-indigo-600 uppercase">Split By</span>
                                <input type="number" id="split_count" value="1" min="1" required class="w-16 p-1 bg-white border rounded-lg text-center font-bold">
                                <span class="text-xs text-indigo-400 font-medium italic">People</span>
                            </div>
                            <button type="submit" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition">Add to Trip</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div id="category-summary" class="flex flex-wrap gap-2"></div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-black border-b">
                                <tr><th class="p-5">Details</th><th class="p-5 text-center">Category</th><th class="p-5 text-right">Total</th><th class="p-5 text-right">Per Person</th><th class="p-5"></th></tr>
                            </thead>
                            <tbody id="expense-table-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5seHBjbW9ncWJibXBub3dmd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTU4MTEsImV4cCI6MjA4OTQzMTgxMX0.37Eqm_8T4QfMKz3qzX6-kGFUz5xOfEIwmP6YEIp1jNQ"; 
        const API_URL = "https://roambudget-server.onrender.com/expenses"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myChart = null;
        let currentTripId = localStorage.getItem('active_trip_id');

        function toggleLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        async function checkUserSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            document.getElementById('auth-container').classList.toggle('hidden', !!session);
            if (session) {
                if (currentTripId) {
                    document.getElementById('trip-selection-container').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('display-trip-id').innerText = `TRIP: ${currentTripId}`;
                    fetchExpenses(session.access_token);
                } else {
                    document.getElementById('trip-selection-container').classList.remove('hidden');
                    document.getElementById('app-container').classList.add('hidden');
                }
            }
        }

        document.getElementById('btn-logout').onclick = async () => {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('active_trip_id');
            window.location.reload();
        };

        document.getElementById('btn-change-trip').onclick = () => {
            localStorage.removeItem('active_trip_id');
            window.location.reload();
        };

        document.getElementById('trip-id-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('input-trip-id').value.trim().toUpperCase();
            localStorage.setItem('active_trip_id', id);
            currentTripId = id;
            checkUserSession();
        };

        async function fetchExpenses(token) {
            toggleLoading(true);
            try {
                const response = await fetch(`${API_URL}/${currentTripId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (Array.isArray(data)) renderUI(data, token);
            } catch (err) { console.error(err); }
            finally { toggleLoading(false); }
        }

        function renderUI(expenses, token) {
            const tableBody = document.getElementById('expense-table-body');
            const totalDisplay = document.getElementById('total-cost');
            const summaryDiv = document.getElementById('category-summary');
            const settleList = document.getElementById('settle-up-list');
            
            tableBody.innerHTML = ''; summaryDiv.innerHTML = ''; settleList.innerHTML = '';
            let grandTotal = 0;
            const catTotals = {};
            const balances = {};

            expenses.forEach(exp => {
                const amt = parseFloat(exp.amount) || 0;
                const splits = parseInt(exp.split_count) || 1;
                const perPerson = amt / splits;
                const payer = exp.paid_by.trim();

                grandTotal += amt;
                catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;

                // Simple Payout Math
                balances[payer] = (balances[payer] || 0) + amt;
                balances[payer] -= perPerson; 

                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="group hover:bg-slate-50 transition">
                        <td class="p-5"><div class="font-bold text-slate-800">${exp.item_name}</div><div class="text-[10px] text-slate-400 font-bold uppercase">Paid By ${payer}</div></td>
                        <td class="p-5 text-center"><span class="px-3 py-1 text-[10px] bg-white border border-slate-200 text-slate-600 rounded-full font-bold uppercase shadow-sm">${exp.category}</span></td>
                        <td class="p-5 text-right font-black text-slate-700">$${amt.toFixed(2)}</td>
                        <td class="p-5 text-right text-indigo-600 font-black">$${perPerson.toFixed(2)}</td>
                        <td class="p-5 text-center"><button onclick="deleteExp(${exp.id}, '${token}')" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 scale-125 px-2 transition">🗑️</button></td>
                    </tr>`);
            });

            totalDisplay.innerText = `$${grandTotal.toFixed(2)}`;
            updateChart(catTotals);

            // Render Settle Up Chips
            for (const [person, bal] of Object.entries(balances)) {
                if (Math.abs(bal) < 0.01) continue;
                const isOwed = bal > 0;
                const color = isOwed ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-rose-600 bg-rose-50 border-rose-100';
                
                settleList.innerHTML += `
                    <div class="flex flex-col p-3 rounded-xl border ${color}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-black text-[10px] uppercase tracking-widest">${person}</span>
                            <span class="font-black text-base">$${Math.abs(bal).toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-bold uppercase opacity-70">${isOwed ? 'Is Owed' : 'Owes Group'}</span>
                            ${!isOwed ? `<button onclick="handleZelle('${person}', ${Math.abs(bal)})" class="text-[9px] bg-white px-2 py-1 rounded shadow-sm font-black uppercase hover:bg-indigo-600 hover:text-white transition">Pay</button>` : ''}
                        </div>
                    </div>`;
            }

            for (const [cat, sum] of Object.entries(catTotals)) {
                summaryDiv.innerHTML += `<div class="bg-white border rounded-full px-4 py-1.5 text-xs shadow-sm font-bold text-slate-600">${cat}: <span class="text-indigo-600">$${sum.toFixed(2)}</span></div>`;
            }
        }

        function handleZelle(name, amt) {
            navigator.clipboard.writeText(name);
            alert(`"${name}" copied to clipboard!\n\nUse this in Zelle or Venmo to pay $${amt.toFixed(2)}`);
        }

        function updateChart(catTotals) {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catTotals),
                    datasets: [{ data: Object.values(catTotals), backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b'], borderWidth: 0 }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '80%' }
            });
        }

        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Syncing...";
            const { data: { session } } = await supabaseClient.auth.getSession();
            const payload = {
                item_name: document.getElementById('item_name').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                paid_by: document.getElementById('paid_by').value,
                split_count: parseInt(document.getElementById('split_count').value),
                trip_id: currentTripId 
            };
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify(payload)
            });
            e.target.reset(); btn.disabled = false; btn.innerText = "Add to Trip";
            fetchExpenses(session.access_token);
        };

        async function deleteExp(id, token) {
            if (!confirm("Remove expense?")) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            fetchExpenses(token);
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            await supabaseClient.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            checkUserSession();
        };

        document.getElementById('btn-signup').onclick = async () => {
            const { error } = await supabaseClient.auth.signUp({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) alert(error.message);
            else alert("Account created!");
        };

        checkUserSession();
    </script>
</body>
</html>
