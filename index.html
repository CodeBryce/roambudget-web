<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Shared Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none; }
        .auth-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for a cleaner dashboard look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col p-3 md:p-5">

    <div id="app-header" class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight italic">RoamBudget</h1>
            <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                <span class="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded">JAMAICA2026</span>
                <button class="hover:text-indigo-600 underline">Settings</button>
                <button class="hover:text-red-500">Sign Out</button>
            </div>
        </div>
        <div class="bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-xl flex flex-col items-end min-w-[200px]">
            <p class="text-[10px] font-bold uppercase opacity-80 tracking-widest">Trip Total</p>
            <h2 class="text-4xl font-black tracking-tighter">$360.00</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-grow h-0">
        
        <div class="lg:col-span-4 flex flex-col gap-4 overflow-y-auto pr-1">
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-center mb-6 h-[180px]">
                    <canvas id="budgetChart"></canvas>
                </div>
                
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Balance Sheet</h3>
                <div id="balance-sheet" class="space-y-2">
                    <div class="flex justify-between items-center p-3 bg-emerald-50 border border-emerald-100 rounded-xl">
                        <span class="text-xs font-bold text-emerald-800 uppercase tracking-wide">Bryce</span>
                        <span class="text-xs font-bold text-emerald-800 italic">Owed $120.00</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-emerald-50 border border-emerald-100 rounded-xl">
                        <span class="text-xs font-bold text-emerald-800 uppercase tracking-wide">Zebb</span>
                        <span class="text-xs font-bold text-emerald-800 italic">Owed $40.00</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-emerald-50 border border-emerald-100 rounded-xl">
                        <span class="text-xs font-bold text-emerald-800 uppercase tracking-wide">Steph</span>
                        <span class="text-xs font-bold text-emerald-800 italic">Owed $20.00</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-800 mb-4">Post New Expense</h3>
                <form class="space-y-3">
                    <input type="text" placeholder="Item Name" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" placeholder="$ Price" class="p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                        <select class="p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold text-slate-600">
                            <option>🏨 Lodging</option>
                            <option>🍔 Food</option>
                            <option>✈️ Transport</option>
                            <option>🎟️ Activity</option>
                        </select>
                    </div>
                    <input type="text" placeholder="Who paid? (Exact Name)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg text-xs uppercase tracking-widest">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-4 h-full">
            
            <div class="flex flex-wrap gap-2">
                <div class="bg-white border border-slate-200 rounded-full px-4 py-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wide">Lodging: <span class="text-indigo-600">$240.00</span></div>
                <div class="bg-white border border-slate-200 rounded-full px-4 py-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wide">Transport: <span class="text-emerald-600">$80.00</span></div>
                <div class="bg-white border border-slate-200 rounded-full px-4 py-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wide">Food: <span class="text-rose-600">$40.00</span></div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-grow">
                <div class="overflow-y-auto flex-grow">
                    <table class="w-full text-left">
                        <tbody class="divide-y divide-slate-100">
                            <tr class="hover:bg-slate-50 transition">
                                <td class="p-4">
                                    <div class="font-bold text-slate-900 text-sm uppercase tracking-tight">Airbnb</div>
                                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Paid by Bryce</div>
                                </td>
                                <td class="p-4 text-center">
                                    <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[9px] font-bold uppercase tracking-tighter">Lodging</span>
                                </td>
                                <td class="p-4 text-right">
                                    <div class="font-bold text-slate-900">$240.00</div>
                                    <div class="text-[10px] text-indigo-600 font-bold uppercase">$120.00 split</div>
                                </td>
                            </tr>
                            <tr class="hover:bg-slate-50 transition">
                                <td class="p-4">
                                    <div class="font-bold text-slate-900 text-sm uppercase tracking-tight">Car Rental</div>
                                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Paid by Zebb</div>
                                </td>
                                <td class="p-4 text-center">
                                    <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[9px] font-bold uppercase tracking-tighter">Transport</span>
                                </td>
                                <td class="p-4 text-right">
                                    <div class="font-bold text-slate-900">$80.00</div>
                                    <div class="text-[10px] text-indigo-600 font-bold uppercase">$40.00 split</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initChart() {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Lodging', 'Food', 'Transport', 'Activity'],
                    datasets: [{
                        data: [240, 40, 80, 20],
                        backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 10,
                                font: { size: 10, weight: 'bold' },
                                padding: 15
                            }
                        }
                    },
                    cutout: '80%'
                }
            });
        }
        initChart();
    </script>
</body>
</html>
