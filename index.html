<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Shared Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
        .auth-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; width: 24px; height: 24px; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white text-center p-6">
        <div class="spinner mb-4"></div>
        <p class="font-bold tracking-wide animate-pulse uppercase text-xs">Loading Trips...</p>
    </div>

    <div id="auth-container" class="auth-card bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-20">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-indigo-600 tracking-tight italic">RoamBudget</h2>
            <p class="text-slate-500 mt-2 text-sm font-medium">Plan. Split. Settle.</p>
        </div>
        <form id="auth-form" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="password" placeholder="Password" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            <button type="submit" id="btn-login" class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg">Login</button>
            <button type="button" id="btn-signup" class="w-full border-2 border-indigo-600 text-indigo-600 font-black py-3 rounded-xl hover:bg-indigo-50 transition">Create Account</button>
        </form>
        <p id="auth-msg" class="text-center text-[10px] mt-4 text-red-500 font-bold uppercase h-4"></p>
    </div>

    <div id="trip-entry-container" class="hidden auth-card bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-10">
        <h2 class="text-2xl font-black text-slate-900 mb-6 text-center tracking-tight text-indigo-600 italic">Your Trips</h2>
        
        <div class="space-y-6">
            <div id="recent-trips-section" class="hidden">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-1 font-bold">Jump Back In</label>
                <div id="recent-trips-list" class="grid grid-cols-1 gap-2 mt-2">
                    </div>
            </div>

            <form id="join-trip-form" class="space-y-3">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-1 font-bold">Join New Trip Code</label>
                <input type="text" id="join-trip-code" placeholder="E.G. JAMAICA2026" required class="w-full p-4 bg-slate-50 border-2 border-dashed rounded-xl outline-none focus:border-indigo-500 text-center font-black uppercase tracking-widest">
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-black transition uppercase text-xs tracking-widest">Join Trip</button>
            </form>

            <div class="relative flex py-2 items-center"><div class="flex-grow border-t border-slate-200"></div><span class="mx-4 text-slate-400 text-[10px] font-black">OR</span><div class="flex-grow border-t border-slate-200"></div></div>

            <form id="create-trip-form" class="space-y-3">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-1 font-bold">Initialize New Trip</label>
                <input type="text" id="create-trip-code" placeholder="NEW TRIP NAME" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-center font-black uppercase tracking-widest">
                <div class="flex items-center gap-2 p-3 bg-indigo-50 rounded-xl">
                    <input type="checkbox" id="check-require-payment" class="w-4 h-4 accent-indigo-600">
                    <label for="check-require-payment" class="text-[10px] font-black uppercase text-indigo-700">Require Payout Profile</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition uppercase text-xs tracking-widest">Create & Enter</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight italic">RoamBudget</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="display-trip-id" class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded font-bold text-[10px] uppercase"></span>
                    <button id="btn-open-profile" class="text-[10px] text-indigo-500 font-black uppercase hover:underline">Settings</button>
                    <button id="btn-change-trip" class="text-[10px] text-slate-400 font-bold uppercase hover:text-indigo-600 underline pl-2 border-l">Switch Trip</button>
                    <button id="btn-logout" class="text-xs text-red-400 hover:text-red-600 font-bold uppercase tracking-widest border-l pl-2">Sign Out</button>
                </div>
            </div>
            <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-2xl text-center min-w-[260px]">
                <p class="text-xs uppercase tracking-widest font-bold opacity-80">Group Total</p>
                <h2 id="total-cost" class="text-5xl font-black mt-1">$0.00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Balance Sheet</h3>
                    <div id="settle-up-list" class="space-y-3"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-bold mb-4">Add Expense</h3>
                    <form id="expense-form" class="space-y-4">
                        <input type="text" id="item_name" placeholder="Item Name" required class="w-full p-3 bg-slate-50 border rounded-xl font-bold outline-none">
                        <input type="number" id="amount" step="0.01" placeholder="$ Price" required class="w-full p-3 bg-slate-50 border rounded-xl font-bold outline-none">
                        <input type="text" id="paid_by" placeholder="Who paid?" required class="w-full p-3 bg-slate-50 border rounded-xl font-bold outline-none">
                        <button type="submit" id="btn-submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition uppercase text-xs tracking-widest">Post to Trip</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden font-medium">
                    <table class="w-full text-left">
                        <tbody id="expense-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5seHBjbW9ncWJibXBub3dmd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTU4MTEsImV4cCI6MjA4OTQzMTgxMX0.37Eqm_8T4QfMKz3qzX6-kGFUz5xOfEIwmP6YEIp1jNQ"; 
        const API_URL = "https://roambudget-server.onrender.com/expenses"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let currentTripId = localStorage.getItem('active_trip_id');

        async function checkUserSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('auth-container').classList.add('hidden');
                if (currentTripId) {
                    document.getElementById('trip-entry-container').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('display-trip-id').innerText = currentTripId;
                    fetchExpenses(session.access_token);
                } else {
                    document.getElementById('trip-entry-container').classList.remove('hidden');
                    document.getElementById('app-container').classList.add('hidden');
                    fetchUserTrips(session.user.id);
                }
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
            }
        }

        // --- FETCH TRIPS FOR SELECTION (NEW) ---
        async function fetchUserTrips(userId) {
            const { data, error } = await supabaseClient
                .from('trips')
                .select('trip_code')
                .eq('creator_id', userId);

            if (data && data.length > 0) {
                const list = document.getElementById('recent-trips-list');
                const section = document.getElementById('recent-trips-section');
                list.innerHTML = '';
                section.classList.remove('hidden');

                data.forEach(trip => {
                    list.insertAdjacentHTML('beforeend', `
                        <button onclick="selectTrip('${trip.trip_code}')" class="w-full text-left p-4 bg-indigo-50 border border-indigo-100 rounded-xl hover:bg-indigo-100 transition flex justify-between items-center group">
                            <span class="font-black text-indigo-700 tracking-widest uppercase text-sm">${trip.trip_code}</span>
                            <span class="text-[10px] font-black text-indigo-300 group-hover:text-indigo-600 transition uppercase">Enter →</span>
                        </button>
                    `);
                });
            }
        }

        window.selectTrip = (code) => {
            currentTripId = code;
            localStorage.setItem('active_trip_id', code);
            checkUserSession();
        };

        // --- AUTH & OTHER LOGIC ---
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });
            if (!error) checkUserSession();
        };

        document.getElementById('join-trip-form').onsubmit = (e) => {
            e.preventDefault();
            selectTrip(document.getElementById('join-trip-code').value.trim().toUpperCase());
        };

        document.getElementById('create-trip-form').onsubmit = async (e) => {
            e.preventDefault();
            const code = document.getElementById('create-trip-code').value.trim().toUpperCase();
            const req = document.getElementById('check-require-payment').checked;
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            const { error } = await supabaseClient.from('trips').insert([{ trip_code: code, creator_id: session.user.id, require_payment: req }]);
            if (!error) selectTrip(code);
            else alert("Error: Trip code might be taken.");
        };

        // ... rest of fetchExpenses and renderUI logic ...
        async function fetchExpenses(token) {
            const response = await fetch(`${API_URL}/${currentTripId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await response.json();
            if (Array.isArray(data)) renderUI(data, token);
        }

        function renderUI(expenses, token) {
            const tableBody = document.getElementById('expense-table-body');
            const settleList = document.getElementById('settle-up-list');
            tableBody.innerHTML = ''; settleList.innerHTML = '';
            let total = 0; let balances = {};

            expenses.forEach(exp => {
                total += exp.amount;
                const perPerson = exp.amount / 2;
                balances[exp.paid_by] = (balances[exp.paid_by] || 0) + exp.amount - perPerson;
                tableBody.insertAdjacentHTML('beforeend', `<tr class="p-4 flex justify-between items-center group"><td><div class="font-black text-slate-900 uppercase text-xs">${exp.item_name}</div><div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest italic">By ${exp.paid_by}</div></td><td class="text-right"><div><div class="font-black text-slate-900">$${exp.amount.toFixed(2)}</div></div></td></tr>`);
            });
            document.getElementById('total-cost').innerText = `$${total.toFixed(2)}`;
            for (const [person, bal] of Object.entries(balances)) {
                if (Math.abs(bal) < 0.1) continue;
                const isOwed = bal > 0;
                settleList.innerHTML += `<div class="p-4 rounded-2xl border ${isOwed ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'} font-black text-[10px] uppercase italic flex justify-between"><span>${person}</span><span>${isOwed ? 'Owed' : 'Owes'} $${Math.abs(bal).toFixed(2)}</span></div>`;
            }
        }

        document.getElementById('btn-logout').onclick = async () => { await supabaseClient.auth.signOut(); localStorage.clear(); location.reload(); };
        document.getElementById('btn-change-trip').onclick = () => { localStorage.removeItem('active_trip_id'); location.reload(); };

        checkUserSession();
    </script>
</body>
</html>
