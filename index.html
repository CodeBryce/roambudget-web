<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-lodging:   #6366f1;
            --color-food:      #f43f5e;
            --color-transport: #10b981;
            --color-activity:  #f59e0b;
            --bg:    #f4f5f7;
            --card:  #ffffff;
            --border:#e4e7ec;
            --text:  #111827;
            --muted: #6b7280;
            --subtle:#9ca3af;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; margin: 0;
        }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity 0.2s; }
        .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

        /* Auth Cards */
        .auth-card, .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 360px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; outline: none; background: #f9fafb; }
        .auth-btn { width: 100%; padding: 10px; background: var(--color-lodging); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }

        /* Groups Home */
        #groups-screen { overflow-y: auto; z-index: 40; }
        .groups-inner { max-width: 560px; margin: 0 auto; padding: 48px 24px; }
        .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; cursor: pointer; }
        .group-card:hover { border-color: #a5b4fc; }

        /* Sidebar & Dashboard Layout Fixes */
        .grid-main { display: grid; grid-template-columns: 300px 1fr; gap: 14px; flex-grow: 1; min-height: 0; padding: 0 20px 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 12px; height: 100%; overflow: hidden; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        
        /* THE COMPACT FIX: Use flex-grow on the list to keep the form at the bottom */
        .chart-card { padding: 14px; flex-shrink: 0; }
        .chart-wrap { height: 120px; display: flex; justify-content: center; } 
        .balance-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
        .balance-list::-webkit-scrollbar { width: 3px; }
        .balance-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .balance-card { display: flex; justify-content: space-between; align-items: center; padding: 8px 11px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .balance-card.owed { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .balance-card.owes { background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239; }

        /* Profile & Member Strip */
        .member-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .member-chip { display: flex; align-items: center; gap: 5px; background: #fff; border: 1px solid var(--border); padding: 3px 10px 3px 4px; border-radius: 20px; font-size: 11px; font-weight: 500; }
        .profile-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; border: none; cursor: pointer; }
        .swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: var(--text); }

        /* Table Area */
        .table-card { flex-grow: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
        .table-inner { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #fff; padding: 10px 16px; font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--subtle); border-bottom: 1px solid var(--border); text-align: left; }
        tbody td { padding: 11px 16px; border-bottom: 1px solid #f3f4f6; }
        
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 12px; opacity: 0; transition: opacity 0.2s; z-index: 200; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen items-center justify-center">
    <div class="auth-card">
        <h2 id="auth-title">Welcome back</h2>
        <p id="auth-subtitle">Sign in to access your trips</p>
        <input class="auth-input" type="email" id="auth-email" placeholder="Email address">
        <input class="auth-input" type="password" id="auth-password" placeholder="Password">
        <button class="auth-btn" id="auth-submit">Sign In</button>
        <div id="auth-error" class="text-red-500 text-[10px] mt-2 h-4"></div>
        <span id="auth-toggle" class="block text-center text-[12px] text-slate-500 mt-4 cursor-pointer">No account? <span class="text-indigo-600 underline">Create one</span></span>
    </div>
</div>

<div id="profile-screen" class="screen hidden items-center justify-center">
    <div class="profile-card text-center">
        <div class="w-16 h-16 rounded-full bg-indigo-500 flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4" id="setup-avatar-preview">?</div>
        <h2 class="text-xl font-bold mb-1">What's your name?</h2>
        <p class="text-xs text-slate-500 mb-4">Choose a color and display name.</p>
        <div class="flex gap-2 justify-center mb-6" id="setup-color-swatches"></div>
        <input class="auth-input" type="text" id="setup-display-name" placeholder="Display name" maxlength="32">
        <button class="auth-btn" id="btn-save-profile">Save & Continue</button>
        <div id="setup-error" class="text-red-500 text-[10px] mt-2"></div>
    </div>
</div>

<div id="groups-screen" class="screen hidden">
    <div class="groups-inner">
        <div class="flex justify-between items-center mb-10">
            <span class="text-2xl font-bold italic">RoamBudget</span>
            <div class="flex items-center gap-3">
                <button class="profile-btn" id="btn-open-profile">?</button>
                <button class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest" onclick="signOut()">Sign Out</button>
            </div>
        </div>
        <div class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Your Active Trips</div>
        <div id="groups-list" class="space-y-2 mb-10"></div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-200">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Create Trip</h4>
                <input class="auth-input" id="new-trip-code" placeholder="Code (e.g. BALI26)">
                <input class="auth-input" id="new-trip-name" placeholder="Name (optional)">
                <button class="auth-btn" id="btn-create-trip" style="padding: 8px;">Create</button>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Join Trip</h4>
                <input class="auth-input" id="join-trip-code" placeholder="Enter code">
                <div class="h-[38px]"></div> <button class="auth-btn" id="btn-join-trip" style="background:#eef2ff; color:#6366f1; padding: 8px;">Join</button>
            </div>
        </div>
    </div>
</div>

<div id="app-screen" class="screen hidden">
    <div class="p-5 flex justify-between items-center flex-shrink-0">
        <div class="flex items-center gap-4">
            <button class="text-xs font-bold text-slate-500 border border-slate-200 px-3 py-1 rounded-lg hover:bg-white" id="btn-back">← Trips</button>
            <span class="bg-indigo-50 text-indigo-600 font-mono text-[11px] px-2 py-1 rounded font-bold" id="display-trip-id">—</span>
            <button class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase ml-2 tracking-widest" onclick="signOut()">Sign Out</button>
        </div>
        <div class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-right shadow-lg">
            <p class="text-[9px] font-bold uppercase opacity-50 tracking-widest">Trip Total</p>
            <h2 class="text-3xl font-bold tracking-tighter" id="total-cost">$0.00</h2>
        </div>
    </div>

    <div class="grid-main">
        <div class="sidebar">
            <div class="card chart-card flex flex-col min-h-0">
                <div class="chart-wrap"><canvas id="budgetChart"></canvas></div>
                <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-4">Balance Sheet</div>
                <div class="balance-list" id="settle-up-list"></div>
            </div>
            <div class="card p-4 flex-shrink-0">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">New Expense</h3>
                <form id="expense-form" class="space-y-2">
                    <input class="auth-input !mb-0" id="item_name" placeholder="Item name" required>
                    <div class="flex gap-2">
                        <input class="auth-input !mb-0" type="number" id="amount" step="0.01" placeholder="$ Price" required>
                        <select class="auth-input !mb-0 text-xs font-bold" id="category">
                            <option value="Lodging">Lodging</option><option value="Food">Food</option>
                            <option value="Transport">Transport</option><option value="Activity">Activity</option>
                        </select>
                    </div>
                    <input class="auth-input !mb-0" id="paid_by" placeholder="Who paid?">
                    <input class="auth-input !mb-2" type="number" id="split_count" placeholder="Split Count" value="2">
                    <button type="submit" class="auth-btn" id="btn-submit">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="flex flex-col gap-3 min-h-0">
            <div class="flex items-center gap-3 flex-shrink-0">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Members</span>
                <div id="member-strip" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
            </div>
            <div id="category-summary" class="flex gap-2 flex-shrink-0"></div>
            <div class="card table-card">
                <div class="table-inner">
                    <table>
                        <thead><tr><th>Expense</th><th>Category</th><th style="text-align:right;">Amount</th><th style="width:40px;"></th></tr></thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// --- CONFIG ---
const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co";
const SB_KEY = "YOUR_KEY_HERE"; 
const API_URL = "https://roambudget-server.onrender.com/expenses";
const TRIPS_API = "https://roambudget-server.onrender.com/trips";
const AVATAR_COLORS = ["#6366f1","#f43f5e","#10b981","#f59e0b","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
const CAT_COLORS = { Lodging: "#6366f1", Food: "#f43f5e", Transport: "#10b981", Activity: "#f59e0b" };

const sb = supabase.createClient(SB_URL, SB_KEY);
let currentTripId = null, currentSession = null, myChart = null, currentDisplayName = "", currentAvatarColor = AVATAR_COLORS[0], isSignUp = false;

// --- UTILS ---
function showScreen(id) { ["auth-screen","profile-screen","groups-screen","app-screen"].forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id)); }
function toast(msg) { const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2500); }
function getInitials(name) { return name ? name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) : "?"; }
function escHtml(str) { return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

// --- AUTH & PROFILE ---
async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentSession = session;
        const meta = session.user.user_metadata || {};
        currentDisplayName = meta.display_name || "";
        currentAvatarColor = meta.avatar_color || AVATAR_COLORS[0];
        if (!currentDisplayName) { initColorSwatches("setup"); showScreen("profile-screen"); }
        else { updateProfileButtons(); showScreen("groups-screen"); loadGroups(); }
    } else { showScreen("auth-screen"); }
}

function updateProfileButtons() {
    const btn = document.getElementById("btn-open-profile");
    if (btn) { btn.textContent = getInitials(currentDisplayName); btn.style.background = currentAvatarColor; }
}

function initColorSwatches(prefix) {
    const container = document.getElementById(`${prefix}-color-swatches`);
    container.innerHTML = "";
    AVATAR_COLORS.forEach(c => {
        const s = document.createElement("div");
        s.className = "swatch" + (c === currentAvatarColor ? " active" : "");
        s.style.background = c;
        s.onclick = () => { 
            currentAvatarColor = c; 
            container.querySelectorAll(".swatch").forEach(x => x.classList.remove("active"));
            s.classList.add("active");
            document.getElementById(`${prefix}-avatar-preview`).style.background = c;
        };
        container.appendChild(s);
    });
}

async function signOut() { await sb.auth.signOut(); location.reload(); }

// --- TRIPS ---
async function loadGroups() {
    const { data } = await sb.from("trip_members").select("trip_id, trips(*)").eq("user_id", currentSession.user.id);
    const list = document.getElementById("groups-list");
    list.innerHTML = data?.length ? "" : `<div class="text-center p-10 text-slate-400 text-xs">No trips yet.</div>`;
    data?.forEach(row => {
        const trip = row.trips;
        list.insertAdjacentHTML("beforeend", `
            <div class="group-card" onclick="enterTrip('${trip.trip_code}', '${trip.name || trip.trip_code}')">
                <div class="flex flex-col"><span class="font-bold text-sm">${trip.name || trip.trip_code}</span><span class="text-[10px] text-slate-400 font-mono">${trip.trip_code}</span></div>
                <span class="text-slate-300">→</span>
            </div>
        `);
    });
}

async function enterTrip(code, name) {
    currentTripId = code;
    document.getElementById("display-trip-id").textContent = name;
    if (currentDisplayName) document.getElementById("paid_by").value = currentDisplayName;
    showScreen("app-screen");
    fetchExpenses();
    loadMemberStrip();
}

async function loadMemberStrip() {
    const { data: tripRow } = await sb.from("trips").select("id").eq("trip_code", currentTripId).single();
    if (!tripRow) return;
    const { data: members } = await sb.from("trip_members").select("display_name, avatar_color").eq("trip_id", tripRow.id);
    const strip = document.getElementById("member-strip");
    strip.innerHTML = "";
    members?.forEach(m => {
        strip.insertAdjacentHTML("beforeend", `
            <div class="member-chip">
                <div class="member-avatar" style="background:${m.avatar_color}">${getInitials(m.display_name)}</div>
                <span>${m.display_name}</span>
            </div>
        `);
    });
}

// --- EXPENSES ---
async function fetchExpenses() {
    const res = await fetch(`${API_URL}/${currentTripId}`, { headers: {"Authorization": `Bearer ${currentSession.access_token}`} });
    const data = await res.json();
    if (Array.isArray(data)) renderUI(data);
}

function renderUI(expenses) {
    const tableBody = document.getElementById("expense-table-body"), settleList = document.getElementById("settle-up-list"), totalDisplay = document.getElementById("total-cost");
    tableBody.innerHTML = ""; settleList.innerHTML = "";
    let total = 0, catTotals = {}, balances = {};

    expenses.forEach(exp => {
        const amt = parseFloat(exp.amount), splits = parseInt(exp.split_count) || 2, perPerson = amt / splits;
        total += amt;
        catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;
        if (!balances[exp.paid_by]) balances[exp.paid_by] = { paid: 0, owed: 0 };
        balances[exp.paid_by].paid += amt;
        balances[exp.paid_by].owed += perPerson;

        tableBody.insertAdjacentHTML("beforeend", `
            <tr>
                <td><div class="font-bold text-sm">${escHtml(exp.item_name)}</div><div class="text-[10px] text-slate-400 font-bold uppercase">By ${escHtml(exp.paid_by)}</div></td>
                <td><span class="text-[9px] font-bold uppercase px-2 py-0.5 rounded bg-slate-100 tag-${exp.category}">${exp.category}</span></td>
                <td class="text-right"><div class="font-bold text-sm">$${amt.toFixed(2)}</div><div class="text-[10px] text-indigo-600 font-bold italic">$${perPerson.toFixed(2)} / person</div></td>
                <td class="text-right"><button class="text-slate-300 hover:text-red-500" onclick="deleteExpense(${exp.id})">✕</button></td>
            </tr>`);
    });

    totalDisplay.textContent = `$${total.toFixed(2)}`;
    updateChart(catTotals);

    Object.entries(balances).forEach(([name, b]) => {
        const net = b.paid - b.owed;
        if (Math.abs(net) < 0.1) return;
        const cls = net > 0 ? "owed" : "owes";
        settleList.insertAdjacentHTML("beforeend", `
            <div class="balance-card ${cls}"><span>${escHtml(name)}</span><span>${net > 0 ? 'is owed' : 'owes'} $${Math.abs(net).toFixed(2)}</span></div>
        `);
    });
}

function updateChart(catTotals) {
    const ctx = document.getElementById("budgetChart").getContext("2d");
    if (myChart) myChart.destroy();
    const labels = Object.keys(catTotals);
    if (!labels.length) return;
    myChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data: Object.values(catTotals), backgroundColor: labels.map(l => CAT_COLORS[l]), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom", labels: { boxWidth: 7, font: { size: 9, weight: '600' } } } }, cutout: "78%" }
    });
}

// --- EVENT HANDLERS ---
document.getElementById("auth-submit").onclick = async () => {
    const email = document.getElementById("auth-email").value, password = document.getElementById("auth-password").value;
    const { data, error } = isSignUp ? await sb.auth.signUp({ email, password }) : await sb.auth.signInWithPassword({ email, password });
    if (error) document.getElementById("auth-error").textContent = error.message; else init();
};

document.getElementById("auth-toggle").onclick = () => {
    isSignUp = !isSignUp;
    document.getElementById("auth-title").textContent = isSignUp ? "Create account" : "Welcome back";
    document.getElementById("auth-submit").textContent = isSignUp ? "Sign Up" : "Sign In";
};

document.getElementById("btn-save-profile").onclick = async () => {
    const name = document.getElementById("setup-display-name").value.trim();
    if (!name) return;
    await sb.auth.updateUser({ data: { display_name: name, avatar_color: currentAvatarColor } });
    init();
};

document.getElementById("expense-form").onsubmit = async e => {
    e.preventDefault();
    const payload = { item_name: document.getElementById("item_name").value, amount: parseFloat(document.getElementById("amount").value), category: document.getElementById("category").value, paid_by: document.getElementById("paid_by").value, split_count: parseInt(document.getElementById("split_count").value), trip_id: currentTripId };
    await fetch(API_URL, { method: "POST", headers: {"Content-Type": "application/json", "Authorization": `Bearer ${currentSession.access_token}`}, body: JSON.stringify(payload) });
    e.target.reset(); fetchExpenses();
    if (currentDisplayName) document.getElementById("paid_by").value = currentDisplayName;
};

document.getElementById("btn-back").onclick = () => showScreen("groups-screen");

init();
</script>
</body>
</html>
