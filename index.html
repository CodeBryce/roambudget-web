<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Shared Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; height: 100vh; overflow: hidden; }
        .hidden { display: none; }
        .auth-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for the table side */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col p-3 md:p-5">

    <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4 flex-shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight italic">RoamBudget</h1>
            <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                <span id="display-trip-id" class="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded">JAMAICA2026</span>
                <button class="hover:text-indigo-600 underline">Settings</button>
                <button id="btn-logout" class="hover:text-red-500">Sign Out</button>
            </div>
        </div>
        <div class="bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-xl flex flex-col items-end min-w-[200px]">
            <p class="text-[10px] font-bold uppercase opacity-80 tracking-widest">Trip Total</p>
            <h2 id="total-cost" class="text-4xl font-black tracking-tighter">$0.00</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-grow h-0">
        
        <div class="lg:col-span-4 flex flex-col gap-4 h-full overflow-hidden">
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col flex-shrink-0">
                <div class="flex justify-center mb-4 h-[140px]">
                    <canvas id="budgetChart"></canvas>
                </div>
                
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Balance Sheet</h3>
                <div id="settle-up-list" class="space-y-2 max-h-[160px] overflow-y-auto no-scrollbar">
                    </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex-shrink-0">
                <h3 class="text-xs font-bold text-slate-800 mb-3 uppercase tracking-wider">Post New Expense</h3>
                <form id="expense-form" class="space-y-2">
                    <input type="text" id="item_name" placeholder="Item Name" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="amount" step="0.01" placeholder="$ Price" required class="p-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                        <select id="category" class="p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 outline-none">
                            <option value="Lodging">🏨 Lodging</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">✈️ Transport</option>
                            <option value="Activity">🎟️ Activity</option>
                        </select>
                    </div>
                    <input type="text" id="paid_by" placeholder="Who paid? (Exact Name)" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                    <button type="submit" id="btn-submit" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl hover:bg-indigo-700 transition shadow-md text-xs uppercase tracking-widest">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-4 h-full overflow-hidden">
            
            <div id="category-summary" class="flex flex-wrap gap-2 flex-shrink-0">
                </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-grow">
                <div class="overflow-y-auto flex-grow">
                    <table class="w-full text-left border-collapse">
                        <tbody id="expense-table-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co"; 
        const SB_KEY = "YOUR_SUPABASE_KEY"; 
        const API_URL = "https://roambudget-server.onrender.com/expenses"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let myChart = null;
        let currentTripId = "JAMAICA2026"; // Example

        async function fetchExpenses() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const response = await fetch(`${API_URL}/${currentTripId}`, {
                headers: { 'Authorization': `Bearer ${session.access_token}` }
            });
            const data = await response.json();
            if (Array.isArray(data)) renderUI(data);
        }

        function renderUI(expenses) {
            const tableBody = document.getElementById('expense-table-body');
            const settleList = document.getElementById('settle-up-list');
            const summaryDiv = document.getElementById('category-summary');
            const totalDisplay = document.getElementById('total-cost');
            
            tableBody.innerHTML = ''; settleList.innerHTML = ''; summaryDiv.innerHTML = '';
            let total = 0; let catTotals = {}; let balances = {};

            expenses.forEach(exp => {
                const amt = parseFloat(exp.amount);
                total += amt;
                catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;
                
                // Logic for "Owed" based on a group of 3 (adjust as needed)
                const perPerson = amt / 3;
                balances[exp.paid_by] = (balances[exp.paid_by] || 0) + amt - perPerson;

                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4">
                            <div class="font-bold text-slate-800 text-sm uppercase tracking-tight">${exp.item_name}</div>
                            <div class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Paid by ${exp.paid_by}</div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[9px] font-bold uppercase tracking-tighter">${exp.category}</span>
                        </td>
                        <td class="p-4 text-right">
                            <div class="font-bold text-slate-900">$${amt.toFixed(2)}</div>
                            <div class="text-[10px] text-indigo-600 font-bold uppercase italic">$${perPerson.toFixed(2)} split</div>
                        </td>
                    </tr>`);
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            updateChart(catTotals);

            // Update Category Pills
            for (const [cat, sum] of Object.entries(catTotals)) {
                summaryDiv.innerHTML += `<div class="bg-white border border-slate-200 rounded-full px-4 py-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wide shadow-sm">${cat}: <span class="text-indigo-600">$${sum.toFixed(2)}</span></div>`;
            }

            // Update Balance Cards
            for (const [person, bal] of Object.entries(balances)) {
                if (bal <= 0) continue;
                settleList.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-emerald-50 border border-emerald-100 rounded-xl shadow-sm">
                        <span class="text-xs font-bold text-emerald-800 uppercase tracking-wide">${person}</span>
                        <span class="text-xs font-bold text-emerald-800 italic">Owed $${bal.toFixed(2)}</span>
                    </div>`;
            }
        }

        function updateChart(catTotals) {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catTotals),
                    datasets: [{
                        data: Object.values(catTotals),
                        backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 9, weight: 'bold' }, padding: 10 } } },
                    cutout: '80%'
                }
            });
        }

        // Add Expense Handler
        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { session } } = await supabaseClient.auth.getSession();
            const payload = {
                item_name: document.getElementById('item_name').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                paid_by: document.getElementById('paid_by').value,
                split_count: 3,
                trip_id: currentTripId
            };
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify(payload)
            });
            e.target.reset();
            fetchExpenses();
        };

        // Initial Load
        fetchExpenses();
    </script>
</body>
</html>
