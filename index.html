<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Shared Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none; }
        .auth-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #6366f1; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-center p-6">
        <div class="spinner mb-4"></div>
        <p class="font-semibold text-slate-600 animate-pulse">Syncing Cloud Data...</p>
    </div>

    <div id="auth-container" class="auth-card bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-20">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-indigo-600 tracking-tight italic">RoamBudget</h2>
            <p class="text-slate-500 mt-2 font-medium">Plan. Split. Settle.</p>
        </div>
        <form id="auth-form" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="password" placeholder="Password" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            <button type="submit" id="btn-login" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg">Login</button>
            <button type="button" id="btn-signup" class="w-full border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-xl hover:bg-indigo-50 transition">Create Account</button>
        </form>
        <p id="auth-msg" class="text-center text-xs mt-4 text-red-500 font-semibold uppercase h-4"></p>
    </div>

    <div id="trip-entry-container" class="hidden auth-card bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-10">
        <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center tracking-tight text-indigo-600 italic">Your Trips</h2>
        <div class="space-y-6">
            <div id="recent-trips-section" class="hidden">
                <label class="text-[11px] font-bold uppercase text-slate-400 ml-1 tracking-widest">Jump Back In</label>
                <div id="recent-trips-list" class="grid grid-cols-1 gap-2 mt-2"></div>
            </div>

            <form id="join-trip-form" class="space-y-3">
                <label class="text-[11px] font-bold uppercase text-slate-400 ml-1 tracking-widest">Join with Code</label>
                <input type="text" id="join-trip-code" placeholder="E.G. JAMAICA2026" required class="w-full p-4 bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-center font-bold uppercase tracking-widest">
                <button type="submit" class="w-full bg-slate-900 text-white font-semibold py-4 rounded-xl shadow-lg hover:bg-black transition text-xs tracking-widest uppercase">Enter Code</button>
            </form>

            <div class="relative flex py-2 items-center"><div class="flex-grow border-t border-slate-200"></div><span class="mx-4 text-slate-400 text-[10px] font-bold uppercase">Or</span><div class="flex-grow border-t border-slate-200"></div></div>

            <form id="create-trip-form" class="space-y-3">
                <label class="text-[11px] font-bold uppercase text-slate-400 ml-1 tracking-widest">New Trip</label>
                <input type="text" id="create-trip-code" placeholder="TRIP NAME" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold uppercase tracking-widest">
                <div class="flex items-center gap-2 p-3 bg-indigo-50 rounded-xl">
                    <input type="checkbox" id="check-require-payment" class="w-4 h-4 accent-indigo-600">
                    <label for="check-require-payment" class="text-[10px] font-bold uppercase text-indigo-700">Require Payout Profile</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition text-xs tracking-widest uppercase">Create & Enter</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div id="profile-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl auth-card border border-slate-100">
                <h2 class="text-2xl font-bold text-slate-900 mb-2">My Profile</h2>
                <div class="space-y-4 mt-6">
                    <input type="text" id="profile-name" placeholder="Display Name (Bryce)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="text" id="profile-venmo" placeholder="Venmo handle (No @)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="text" id="profile-cashapp" placeholder="CashApp Tag (No $)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                    <button id="btn-save-profile" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition uppercase text-xs tracking-widest">Save Settings</button>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-bold text-slate-900 tracking-tight italic">RoamBudget</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="display-trip-id" class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded font-bold text-[10px] uppercase"></span>
                    <button id="btn-open-profile" class="text-[10px] text-indigo-500 font-bold uppercase hover:underline">Settings</button>
                    <button id="btn-change-trip" class="text-[10px] text-slate-400 font-bold uppercase hover:text-indigo-600 underline pl-2 border-l border-slate-300">Switch Trip</button>
                    <button id="btn-logout" class="text-xs text-red-400 hover:text-red-600 font-bold uppercase tracking-widest border-l border-slate-300 pl-2">Sign Out</button>
                </div>
            </div>
            <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-2xl text-center min-w-[260px]">
                <p class="text-xs uppercase tracking-widest font-semibold opacity-80">Trip Total</p>
                <h2 id="total-cost" class="text-5xl font-bold mt-1">$0.00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <canvas id="budgetChart" class="max-h-[160px] mb-6"></canvas>
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Balance Sheet</h3>
                    <div id="settle-up-list" class="space-y-3"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-bold mb-4">Post Expense</h3>
                    <div id="payment-warning" class="hidden bg-rose-50 text-rose-600 p-4 rounded-xl text-[10px] font-bold uppercase mb-4 border border-rose-100 italic leading-relaxed text-center">
                        ⚠️ Please update your Venmo/CashApp in "Settings" to add expenses.
                    </div>
                    <form id="expense-form" class="space-y-4">
                        <input type="text" id="item_name" placeholder="Item Name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="amount" step="0.01" placeholder="$ Price" required class="p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                            <select id="category" class="p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="Lodging">🏨 Lodging</option>
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">✈️ Transport</option>
                                <option value="Activity">🎟️ Activity</option>
                            </select>
                        </div>
                        <input type="text" id="paid_by" placeholder="Who paid?" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500">
                        <button type="submit" id="btn-submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition disabled:opacity-30 disabled:grayscale uppercase text-xs tracking-widest">Add to Trip</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div id="category-summary" class="flex flex-wrap gap-2"></div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <tbody id="expense-table-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5seHBjbW9ncWJibXBub3dmd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTU4MTEsImV4cCI6MjA4OTQzMTgxMX0.37Eqm_8T4QfMKz3qzX6-kGFUz5xOfEIwmP6YEIp1jNQ"; 
        const API_URL = "https://roambudget-server.onrender.com/expenses"; 

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let currentTripId = localStorage.getItem('active_trip_id');
        let tripSettings = { require_payment: false };
        let myChart = null;

        async function checkUserSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('auth-container').classList.add('hidden');
                if (currentTripId) {
                    try { await loadTripSettings(); } catch(e) { console.error(e); }
                    document.getElementById('trip-entry-container').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('display-trip-id').innerText = currentTripId;
                    if (localStorage.getItem('profile_name')) document.getElementById('paid_by').value = localStorage.getItem('profile_name');
                    fetchExpenses(session.access_token);
                } else {
                    document.getElementById('trip-entry-container').classList.remove('hidden');
                    document.getElementById('app-container').classList.add('hidden');
                    renderTripList(session.user.id);
                }
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
            }
        }

        async function loadTripSettings() {
            if (!currentTripId) return;
            const { data } = await supabaseClient.from('trips').select('*').eq('trip_code', currentTripId);
            if (data && data.length > 0) tripSettings = data[0];
            
            const hasPayment = !!localStorage.getItem('profile_venmo') || !!localStorage.getItem('profile_cashapp');
            const meetsReq = !tripSettings.require_payment || hasPayment;
            document.getElementById('btn-submit').disabled = !meetsReq;
            document.getElementById('payment-warning').classList.toggle('hidden', meetsReq);
        }

        async function renderTripList(userId) {
            const { data } = await supabaseClient.from('trips').select('*');
            const list = document.getElementById('recent-trips-list');
            const section = document.getElementById('recent-trips-section');
            const hiddenCodes = JSON.parse(localStorage.getItem('hidden_trips') || "[]");
            const joinedCodes = JSON.parse(localStorage.getItem('joined_trips') || "[]");

            let allVisibleCodes = [...new Set([...(data || []).map(t => t.trip_code), ...joinedCodes])];
            allVisibleCodes = allVisibleCodes.filter(c => !hiddenCodes.includes(c));

            if (allVisibleCodes.length > 0) {
                section.classList.remove('hidden');
                list.innerHTML = '';
                allVisibleCodes.forEach(code => {
                    const isCreator = (data || []).find(t => t.trip_code === code && t.creator_id === userId);
                    list.insertAdjacentHTML('beforeend', `
                        <div class="flex gap-2 group">
                            <button onclick="selectTrip('${code}')" class="flex-grow text-left p-4 bg-slate-50 border border-slate-200 rounded-xl hover:bg-indigo-50 hover:border-indigo-200 transition flex justify-between items-center">
                                <span class="font-bold text-slate-700 tracking-widest uppercase text-xs">${code}</span>
                                ${isCreator ? '<span class="text-[9px] bg-indigo-100 px-2 py-0.5 rounded text-indigo-600 font-bold uppercase tracking-tighter">Creator</span>' : ''}
                            </button>
                            <button onclick="removeTrip('${code}', ${!!isCreator})" class="px-4 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition font-bold text-sm">×</button>
                        </div>
                    `);
                });
            } else { section.classList.add('hidden'); }
        }

        window.removeTrip = async (code, isCreator) => {
            const msg = isCreator ? `DELETE trip "${code}" for everyone?` : `Remove "${code}" from your list?`;
            if (!confirm(msg)) return;
            if (isCreator) await supabaseClient.from('trips').delete().eq('trip_code', code);
            const hidden = JSON.parse(localStorage.getItem('hidden_trips') || "[]");
            hidden.push(code);
            localStorage.setItem('hidden_trips', JSON.stringify(hidden));
            location.reload();
        };

        window.selectTrip = (code) => {
            localStorage.setItem('active_trip_id', code);
            const joined = JSON.parse(localStorage.getItem('joined_trips') || "[]");
            if (!joined.includes(code)) { joined.push(code); localStorage.setItem('joined_trips', JSON.stringify(joined)); }
            location.reload();
        };

        async function fetchExpenses(token) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            try {
                const response = await fetch(`${API_URL}/${currentTripId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (Array.isArray(data)) renderUI(data, token);
            } finally { document.getElementById('loading-overlay').classList.add('hidden'); }
        }

        function renderUI(expenses, token) {
            const tableBody = document.getElementById('expense-table-body');
            const settleList = document.getElementById('settle-up-list');
            const catSummary = document.getElementById('category-summary');
            tableBody.innerHTML = ''; settleList.innerHTML = ''; catSummary.innerHTML = '';
            
            let total = 0; let balances = {}; let catTotals = {};

            expenses.forEach(exp => {
                const amt = parseFloat(exp.amount) || 0;
                total += amt;
                catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;
                
                const perPerson = amt / 2;
                balances[exp.paid_by] = (balances[exp.paid_by] || 0) + amt - perPerson;
                
                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="p-4 flex justify-between items-center group">
                        <td><div class="font-bold text-slate-800 text-sm uppercase tracking-tight">${exp.item_name}</div><div class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest">Paid By ${exp.paid_by}</div></td>
                        <td class="text-right flex items-center gap-4">
                            <div><div class="font-bold text-slate-900">$${amt.toFixed(2)}</div><div class="text-indigo-600 font-semibold text-[10px] uppercase tracking-tighter italic">$${perPerson.toFixed(2)} Split</div></div>
                            <button onclick="deleteExp(${exp.id}, '${token}')" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition px-2">🗑️</button>
                        </td>
                    </tr>`);
            });

            document.getElementById('total-cost').innerText = `$${total.toFixed(2)}`;
            updateChart(catTotals);

            for (const [cat, sum] of Object.entries(catTotals)) {
                catSummary.innerHTML += `<div class="bg-white border border-slate-200 rounded-full px-4 py-1.5 text-[10px] font-bold text-slate-600 uppercase tracking-wide shadow-sm">${cat}: <span class="text-indigo-600">$${sum.toFixed(2)}</span></div>`;
            }

            for (const [person, bal] of Object.entries(balances)) {
                if (Math.abs(bal) < 0.1) continue;
                const isOwed = bal > 0;
                settleList.innerHTML += `
                    <div class="p-4 rounded-2xl border ${isOwed ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-rose-50 border-rose-100 text-rose-700'} space-y-3 shadow-sm">
                        <div class="flex justify-between items-center font-bold uppercase text-[10px] tracking-widest italic"><span>${person}</span><span>${isOwed ? 'Owed' : 'Owes'} $${Math.abs(bal).toFixed(2)}</span></div>
                        ${isOwed ? `<button onclick="payUser('${person}', ${Math.abs(bal)})" class="w-full bg-white/70 hover:bg-white py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm transition">Choose Payout Method</button>` : ''}
                    </div>`;
            }
        }

        function updateChart(catTotals) {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catTotals),
                    datasets: [{ data: Object.values(catTotals), backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b'], borderWidth: 0, hoverOffset: 4 }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '82%', animation: { animateRotate: true } }
            });
        }

        function payUser(name, amt) {
            const platform = confirm(`Pay ${name} via Venmo? (Cancel for CashApp)`) ? 'venmo' : 'cashapp';
            let handle = platform === 'venmo' ? prompt(`Enter ${name}'s Venmo (no @):`) : prompt(`Enter ${name}'s CashApp (no $):`);
            if (handle) {
                navigator.clipboard.writeText(amt.toFixed(2));
                alert(`Amount copied! Opening ${platform}...`);
                window.location.href = platform === 'venmo' ? `https://venmo.com/${handle}` : `https://cash.app/$${handle}/${amt.toFixed(2)}`;
            }
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) document.getElementById('auth-msg').innerText = error.message;
            else checkUserSession();
        };

        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { session } } = await supabaseClient.auth.getSession();
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify({ item_name: document.getElementById('item_name').value, amount: parseFloat(document.getElementById('amount').value), category: document.getElementById('category').value, paid_by: document.getElementById('paid_by').value, split_count: 2, trip_id: currentTripId })
            });
            location.reload();
        };

        document.getElementById('btn-save-profile').onclick = () => {
            localStorage.setItem('profile_name', document.getElementById('profile-name').value.trim());
            localStorage.setItem('profile_venmo', document.getElementById('profile-venmo').value.trim().replace('@',''));
            localStorage.setItem('profile_cashapp', document.getElementById('profile-cashapp').value.trim().replace('$',''));
            location.reload();
        };

        document.getElementById('btn-open-profile').onclick = () => document.getElementById('profile-modal').classList.remove('hidden');
        document.getElementById('btn-logout').onclick = async () => { await supabaseClient.auth.signOut(); localStorage.clear(); location.reload(); };
        document.getElementById('btn-change-trip').onclick = () => { localStorage.removeItem('active_trip_id'); location.reload(); };
        async function deleteExp(id, token) { if (confirm("Remove?")) { await fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); location.reload(); } }

        checkUserSession();
    </script>
</body>
</html>
