<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-lodging: #6366f1; --color-food: #f43f5e; --color-transport: #10b981; --color-activity: #f59e0b;
            --bg: #f4f5f7; --card: #ffffff; --border: #e4e7ec; --text: #111827; --muted: #6b7280; --subtle: #9ca3af;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; margin: 0; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity 0.2s; }
        .hidden { display: none !important; }
        .auth-card, .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 360px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; outline: none; }
        .auth-btn { width: 100%; padding: 10px; background: var(--color-lodging); color: #fff; border-radius: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        
        /* Sidebar/Grid fixes */
        .grid-main { display: grid; grid-template-columns: 300px 1fr; gap: 14px; flex-grow: 1; min-height: 0; padding: 0 20px 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 12px; height: 100%; overflow: hidden; }
        .balance-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .balance-card { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid transparent; }
        .balance-card.owed { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .balance-card.owes { background: #fff1f2; border-color: #fecdd3; color: #9f1239; }

        /* Avatars & Member Strip */
        .member-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .member-chip { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--border); padding: 3px 10px 3px 4px; border-radius: 20px; font-size: 11px; font-weight: 500; }
        .profile-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; border: none; cursor: pointer; font-size: 12px; }
        
        /* Table Scroll */
        .table-inner { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; }
        tbody td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen items-center justify-center">
    <div class="auth-card">
        <h2 class="text-xl font-bold mb-1">Welcome back</h2>
        <p class="text-xs text-slate-500 mb-6">Sign in to access your trips</p>
        <input class="auth-input" type="email" id="auth-email" placeholder="Email address">
        <input class="auth-input" type="password" id="auth-password" placeholder="Password">
        <button class="auth-btn" id="auth-submit">Sign In</button>
        <div id="auth-error" class="text-red-500 text-[10px] mt-2"></div>
        <p id="auth-toggle" class="text-center text-[11px] mt-4 text-slate-500 cursor-pointer">No account? <span class="text-indigo-600 underline">Create one</span></p>
    </div>
</div>

<div id="profile-screen" class="screen hidden items-center justify-center">
    <div class="profile-card text-center">
        <div id="setup-avatar-preview" class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-white font-bold text-2xl">?</div>
        <h2 class="font-bold mb-1">What's your name?</h2>
        <div class="flex gap-2 justify-center mb-4" id="color-swatches"></div>
        <input class="auth-input" type="text" id="setup-display-name" placeholder="Display name">
        <button class="auth-btn" id="btn-save-profile">Save & Continue</button>
    </div>
</div>

<div id="groups-screen" class="screen hidden overflow-y-auto">
    <div class="max-w-xl mx-auto w-full p-8">
        <div class="flex justify-between items-center mb-8">
            <span class="brand italic font-bold text-xl">RoamBudget</span>
            <div class="flex items-center gap-3">
                <button class="profile-btn" id="btn-open-profile">?</button>
                <button class="text-xs font-bold text-slate-400 hover:text-red-500 uppercase" onclick="signOut()">Sign Out</button>
            </div>
        </div>
        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Your Trips</div>
        <div id="groups-list" class="space-y-2 mb-8"></div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Create Trip</h4>
                <input class="auth-input !text-xs" id="new-trip-code" placeholder="Trip Code">
                <button class="auth-btn !py-2" id="btn-create-trip">Create</button>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Join Trip</h4>
                <input class="auth-input !text-xs" id="join-trip-code" placeholder="Enter Code">
                <button class="auth-btn !bg-slate-100 !text-indigo-600 !py-2" id="btn-join-trip">Join</button>
            </div>
        </div>
    </div>
</div>

<div id="app-screen" class="screen hidden">
    <div class="p-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button class="text-xs font-bold text-slate-500 border border-slate-200 px-3 py-1 rounded-lg hover:bg-white" id="btn-back">← My Trips</button>
            <span class="bg-indigo-50 text-indigo-600 font-mono text-[11px] px-2 py-1 rounded" id="display-trip-id">JAMAICA2026</span>
            <button class="text-xs font-bold text-slate-400 hover:text-red-500 uppercase ml-2" onclick="signOut()">Sign Out</button>
        </div>
        <div class="bg-slate-900 text-white px-5 py-2 rounded-xl text-right">
            <p class="text-[9px] font-bold uppercase opacity-50">Trip Total</p>
            <h2 class="text-2xl font-bold tracking-tighter" id="total-cost">$0.00</h2>
        </div>
    </div>

    <div class="grid-main">
        <div class="sidebar">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 flex flex-col min-h-0">
                <div class="h-32 flex justify-center mb-4"><canvas id="budgetChart"></canvas></div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Balance Sheet</div>
                <div class="balance-list" id="settle-up-list"></div>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Post New Expense</h3>
                <form id="expense-form" class="space-y-2">
                    <input class="auth-input !mb-0" id="item_name" placeholder="Item name" required>
                    <div class="flex gap-2">
                        <input class="auth-input !mb-0" type="number" id="amount" step="0.01" placeholder="$ Price" required>
                        <select class="auth-input !mb-0 text-xs font-semibold" id="category">
                            <option value="Lodging">Lodging</option><option value="Food">Food</option>
                            <option value="Transport">Transport</option><option value="Activity">Activity</option>
                        </select>
                    </div>
                    <input class="auth-input !mb-0" id="paid_by" placeholder="Who paid?">
                    <input class="auth-input !mb-2" type="number" id="split_count" placeholder="Split Count" value="2">
                    <button type="submit" class="auth-btn" id="btn-submit">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="flex flex-col gap-3 min-h-0">
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Members</span>
                <div id="member-strip" class="flex gap-2"></div>
            </div>
            <div id="category-summary" class="flex gap-2"></div>
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden flex flex-col flex-grow">
                <div class="table-inner">
                    <table>
                        <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase sticky top-0">
                            <tr><th class="p-4 text-left">Expense</th><th class="p-4 text-left">Category</th><th class="p-4 text-right">Amount</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://nlxpcmogqbbmpnowfwhi.supabase.co";
const SB_KEY = "YOUR_KEY_HERE"; 
const API_URL = "https://roambudget-server.onrender.com/expenses";
const AVATAR_COLORS = ["#6366f1","#f43f5e","#10b981","#f59e0b","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentTripId = null, currentSession = null, myChart = null;

async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentSession = session;
        const meta = session.user.user_metadata || {};
        if (!meta.display_name) { setupProfileUI(); showScreen("profile-screen"); }
        else { updateProfileUI(meta); showScreen("groups-screen"); loadGroups(); }
    } else { showScreen("auth-screen"); }
}

function updateProfileUI(meta) {
    const initials = meta.display_name.split(" ").map(n => n[0]).join("").toUpperCase();
    const btns = [document.getElementById("btn-open-profile")];
    btns.forEach(b => { if(b) { b.textContent = initials; b.style.background = meta.avatar_color; } });
}

function setupProfileUI() {
    const container = document.getElementById("color-swatches");
    container.innerHTML = "";
    AVATAR_COLORS.forEach(c => {
        const d = document.createElement("div");
        d.className = "w-6 h-6 rounded-full cursor-pointer hover:scale-110 transition";
        d.style.background = c;
        d.onclick = () => { document.getElementById("setup-avatar-preview").style.background = c; d.dataset.selected = "true"; };
        container.appendChild(d);
    });
}

async function signOut() { await sb.auth.signOut(); location.reload(); }

async function loadMemberStrip() {
    const { data: members } = await sb.from('trip_members').select('display_name, avatar_color').eq('trip_id', currentTripId);
    const strip = document.getElementById("member-strip");
    strip.innerHTML = "";
    members?.forEach(m => {
        const initials = m.display_name?.split(" ").map(n => n[0]).join("").toUpperCase() || "?";
        strip.insertAdjacentHTML("beforeend", `
            <div class="member-chip">
                <div class="member-avatar" style="background:${m.avatar_color}">${initials}</div>
                <span>${m.display_name}</span>
            </div>
        `);
    });
}

function renderUI(expenses) {
    const tableBody = document.getElementById("expense-table-body");
    const settleList = document.getElementById("settle-up-list");
    tableBody.innerHTML = ""; settleList.innerHTML = "";
    let total = 0, catTotals = {}, balances = {};

    expenses.forEach(exp => {
        const amt = parseFloat(exp.amount), perPerson = amt / (parseInt(exp.split_count) || 2);
        total += amt;
        catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;
        if (!balances[exp.paid_by]) balances[exp.paid_by] = { paid: 0, owed: 0 };
        balances[exp.paid_by].paid += amt;
        balances[exp.paid_by].owed += perPerson;

        tableBody.insertAdjacentHTML("beforeend", `
            <tr class="hover:bg-slate-50">
                <td><div class="font-bold text-sm">${exp.item_name}</div><div class="text-[10px] text-slate-400 font-bold uppercase">By ${exp.paid_by}</div></td>
                <td><span class="text-[10px] font-bold uppercase py-1 px-2 rounded-md bg-slate-100">${exp.category}</span></td>
                <td class="text-right"><div class="font-bold">$${amt.toFixed(2)}</div><div class="text-[10px] text-indigo-600 font-bold italic">$${perPerson.toFixed(2)} / person</div></td>
            </tr>`);
    });
    document.getElementById("total-cost").textContent = `$${total.toFixed(2)}`;
    
    Object.entries(balances).forEach(([name, b]) => {
        const net = b.paid - b.owed;
        if (Math.abs(net) < 0.1) return;
        const cls = net > 0 ? "owed" : "owes";
        settleList.insertAdjacentHTML("beforeend", `
            <div class="balance-card ${cls}"><span>${name}</span><span>${net > 0 ? 'is owed' : 'owes'} $${Math.abs(net).toFixed(2)}</span></div>
        `);
    });
    updateChart(catTotals);
    loadMemberStrip();
}

// ... rest of Auth/Fetch/Chart logic (same as previous working versions) ...
async function fetchExpenses() {
    const res = await fetch(`${API_URL}/${currentTripId}`, { headers: {"Authorization": `Bearer ${currentSession.access_token}`} });
    const data = await res.json(); renderUI(data);
}

document.getElementById("auth-submit").onclick = async () => {
    const email = document.getElementById("auth-email").value, password = document.getElementById("auth-password").value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) document.getElementById("auth-error").textContent = error.message; else init();
};

document.getElementById("btn-save-profile").onclick = async () => {
    const name = document.getElementById("setup-display-name").value;
    const color = document.getElementById("setup-avatar-preview").style.background;
    await sb.auth.updateUser({ data: { display_name: name, avatar_color: color } });
    init();
};

function showScreen(id) { ["auth-screen", "profile-screen", "groups-screen", "app-screen"].forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id)); }
document.getElementById("btn-back").onclick = () => showScreen("groups-screen");
function updateChart(data) { /* Standard Chart.js init */ }

init();
</script>
</body>
</html>
