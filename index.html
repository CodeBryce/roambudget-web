<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Secure Trip Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div id="auth-container" class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md mx-auto mt-20">
            <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">✈️ RoamBudget Login</h2>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" placeholder="Email" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="password" placeholder="Password" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <div class="flex gap-2">
                    <button type="submit" id="btn-login" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Login</button>
                    <button type="button" id="btn-signup" class="flex-1 border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-lg hover:bg-indigo-50 transition">Sign Up</button>
                </div>
            </form>
            <p id="auth-msg" class="text-center text-sm mt-4 text-red-500 font-medium"></p>
        </div>

        <div id="app-container" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">RoamBudget</h1>
                    <button id="btn-logout" class="text-xs text-slate-400 hover:text-red-500 font-bold uppercase tracking-widest mt-1">Sign Out</button>
                </div>
                <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg text-center min-w-[200px]">
                    <p class="text-xs uppercase tracking-widest font-semibold opacity-80">My Trip Total</p>
                    <h2 id="total-cost" class="text-4xl font-bold mt-1">$0.00</h2>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
                <form id="expense-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Item Name</label>
                        <input type="text" id="item_name" required class="w-full p-2 border rounded-lg outline-none">
                    </div>
                    <input type="number" id="amount" step="0.01" placeholder="Amount ($)" required class="w-full p-2 border rounded-lg outline-none">
                    <select id="category" class="w-full p-2 border rounded-lg outline-none">
                        <option value="Lodging">Lodging</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Activity">Activity</option>
                    </select>
                    <input type="text" id="paid_by" placeholder="Paid By" required class="w-full p-2 border rounded-lg outline-none">
                    <input type="number" id="split_count" value="1" min="1" class="w-full p-2 border rounded-lg outline-none">
                    <button type="submit" class="md:col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md">Add Expense</button>
                </form>
            </div>

            <div id="category-summary" class="flex flex-wrap gap-2 mb-6"></div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b">
                        <tr><th class="p-4">Item</th><th class="p-4">Category</th><th class="p-4 text-right">Total</th><th class="p-4 text-center">Action</th></tr>
                    </thead>
                    <tbody id="expense-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION (Use your Supabase project keys here) ---
        const SB_URL = "YOUR_SUPABASE_URL";
        const SB_KEY = "YOUR_SUPABASE_ANON_KEY";
        const API_URL = "https://roambudget-server.onrender.com/expenses";

        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // --- 2. AUTHENTICATION LOGIC ---
        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                fetchExpenses(session.access_token);
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        }

        document.getElementById('btn-signup').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) document.getElementById('auth-msg').innerText = error.message;
            else alert("Check your email for confirmation!");
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('auth-msg').innerText = error.message;
            else checkUser();
        };

        document.getElementById('btn-logout').onclick = async () => {
            await supabase.auth.signOut();
            checkUser();
        };

        // --- 3. DATA LOGIC (Passing the Token) ---
        async function fetchExpenses(token) {
            const response = await fetch(API_URL, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            renderUI(data, token);
        }

        function renderUI(expenses, token) {
            const tableBody = document.getElementById('expense-table-body');
            let grandTotal = 0;
            tableBody.innerHTML = '';

            expenses.forEach(exp => {
                grandTotal += exp.amount;
                const row = `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-4 font-bold text-slate-700">${exp.item_name}</td>
                        <td class="p-4 text-center"><span class="px-2 py-1 text-[10px] bg-indigo-50 text-indigo-600 rounded-full font-bold uppercase">${exp.category}</span></td>
                        <td class="p-4 text-right font-bold">$${exp.amount.toFixed(2)}</td>
                        <td class="p-4 text-center"><button onclick="deleteExp(${exp.id}, '${token}')" class="text-slate-300 hover:text-red-500">🗑️</button></td>
                    </tr>`;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
            document.getElementById('total-cost').innerText = `$${grandTotal.toFixed(2)}`;
        }

        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data: { session } } = await supabase.auth.getSession();
            const payload = {
                item_name: document.getElementById('item_name').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                paid_by: document.getElementById('paid_by').value,
                split_count: parseInt(document.getElementById('split_count').value),
                is_booked: false
            };
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                body: JSON.stringify(payload)
            });
            e.target.reset();
            fetchExpenses(session.access_token);
        };

        async function deleteExp(id, token) {
            if (!confirm("Delete?")) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            fetchExpenses(token);
        }

        checkUser();
    </script>
</body>
</html>
