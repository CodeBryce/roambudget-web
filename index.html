<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Shared Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-lodging:   #6366f1;
            --color-food:      #f43f5e;
            --color-transport: #10b981;
            --color-activity:  #f59e0b;
            --bg:    #f4f5f7;
            --card:  #ffffff;
            --border:#e4e7ec;
            --text:  #111827;
            --muted: #6b7280;
            --subtle:#9ca3af;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* ── Auth Screen ─────────────────────────────── */
        #auth-screen {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
        }
        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            width: 360px;
            animation: slideUp 0.35s ease-out both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-card h2 {
            font-size: 22px; font-weight: 600; letter-spacing: -0.3px;
            margin: 0 0 4px;
        }
        .auth-card p { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
        .auth-card input {
            display: block; width: 100%;
            padding: 9px 12px; margin-bottom: 10px;
            border: 1px solid var(--border); border-radius: 10px;
            font-family: inherit; font-size: 13px;
            background: #f9fafb; outline: none;
            transition: border-color 0.15s;
        }
        .auth-card input:focus { border-color: var(--color-lodging); }
        .auth-btn {
            width: 100%; padding: 10px;
            background: var(--color-lodging); color: #fff;
            border: none; border-radius: 10px;
            font-family: inherit; font-size: 12px;
            font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
            cursor: pointer; transition: background 0.15s;
        }
        .auth-btn:hover { background: #4f46e5; }
        #auth-toggle {
            display: block; text-align: center; margin-top: 14px;
            font-size: 12px; color: var(--muted); cursor: pointer;
        }
        #auth-toggle span { color: var(--color-lodging); text-decoration: underline; }
        #auth-error { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 16px; }

        /* ── Layout ──────────────────────────────────── */
        #app {
            display: flex; flex-direction: column;
            padding: 16px 20px; height: 100vh;
        }
        #app.hidden { display: none; }

        /* ── Header ──────────────────────────────────── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px; flex-shrink: 0;
        }
        .brand {
            font-size: 20px; font-weight: 600;
            letter-spacing: -0.4px; font-style: italic;
            color: var(--text);
        }
        .trip-badge {
            font-family: 'DM Mono', monospace;
            font-size: 10px; font-weight: 500;
            background: #eef2ff; color: var(--color-lodging);
            padding: 3px 8px; border-radius: 6px;
            letter-spacing: 0.04em;
        }
        .meta-actions { display: flex; align-items: center; gap: 12px; }
        .meta-actions button {
            font-size: 11px; font-weight: 500;
            color: var(--subtle); background: none; border: none;
            cursor: pointer; font-family: inherit;
            transition: color 0.15s;
        }
        .meta-actions button:hover { color: #ef4444; }
        .total-pill {
            background: var(--text); color: #fff;
            padding: 8px 18px; border-radius: 14px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .total-pill .label {
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            opacity: 0.5;
        }
        .total-pill .amount {
            font-size: 26px; font-weight: 600;
            letter-spacing: -1px; line-height: 1;
        }

        /* ── Grid ────────────────────────────────────── */
        .grid-main {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 14px;
            flex-grow: 1;
            min-height: 0;
        }

        /* ── Cards ───────────────────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .sidebar {
            display: flex; flex-direction: column; gap: 12px;
            overflow: hidden;
        }

        /* ── Chart card ──────────────────────────────── */
        .chart-card { padding: 16px; flex-shrink: 0; }
        .chart-wrap { height: 140px; display: flex; justify-content: center; }

        /* ── Balance Sheet ───────────────────────────── */
        .section-label {
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--subtle); margin-bottom: 8px;
        }
        .balance-list { display: flex; flex-direction: column; gap: 6px; max-height: 150px; overflow-y: auto; }
        .balance-list::-webkit-scrollbar { width: 3px; }
        .balance-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .balance-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 12px; border-radius: 10px;
            font-size: 11px; font-weight: 500;
        }
        .balance-card.owed {
            background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534;
        }
        .balance-card.owes {
            background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239;
        }
        .balance-card .name { font-weight: 600; letter-spacing: 0.02em; }
        .balance-card .val  { font-family: 'DM Mono', monospace; font-size: 11px; }

        /* ── Payout buttons ──────────────────────────── */
        .payout-row {
            display: flex; gap: 6px; margin-top: 4px;
        }
        .payout-btn {
            flex: 1; padding: 4px 0;
            border-radius: 6px; border: 1px solid var(--border);
            font-size: 9px; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; cursor: pointer;
            font-family: inherit; background: var(--card);
            color: var(--muted); text-align: center;
            text-decoration: none; display: block;
            transition: all 0.15s;
        }
        .payout-btn:hover { border-color: #a5b4fc; color: var(--color-lodging); }

        /* ── Form card ───────────────────────────────── */
        .form-card { padding: 14px; flex-shrink: 0; }
        .form-card h3 { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }
        .form-card input,
        .form-card select {
            width: 100%; padding: 8px 10px;
            background: #f9fafb; border: 1px solid var(--border);
            border-radius: 9px; font-family: inherit; font-size: 12px;
            color: var(--text); outline: none; transition: border-color 0.15s;
            margin-bottom: 8px; display: block;
        }
        .form-card input:focus,
        .form-card select:focus { border-color: var(--color-lodging); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .form-grid input,
        .form-grid select { margin-bottom: 0; }
        .submit-btn {
            width: 100%; padding: 9px;
            background: var(--text); color: #fff;
            border: none; border-radius: 9px;
            font-family: inherit; font-size: 10px;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
            cursor: pointer; transition: opacity 0.15s; margin-top: 2px;
        }
        .submit-btn:hover { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.45; cursor: default; }

        /* ── Right column ────────────────────────────── */
        .right-col { display: flex; flex-direction: column; gap: 10px; min-height: 0; }

        /* ── Category pills ──────────────────────────── */
        .cat-pills { display: flex; flex-wrap: wrap; gap: 7px; flex-shrink: 0; }
        .cat-pill {
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 10px; font-weight: 500;
            color: var(--muted); white-space: nowrap;
        }
        .cat-pill .cat-amt {
            font-family: 'DM Mono', monospace;
            font-size: 10px; font-weight: 500;
        }

        /* ── Table ───────────────────────────────────── */
        .table-card {
            flex-grow: 1; min-height: 0;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .table-inner { overflow-y: auto; flex-grow: 1; }
        .table-inner::-webkit-scrollbar { width: 4px; }
        .table-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 10px 16px;
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--subtle); text-align: left;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--card);
        }
        thead th:last-child { text-align: right; }
        tbody tr { transition: background 0.1s; }
        tbody tr:hover { background: #fafbfc; }
        tbody td { padding: 11px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }

        .exp-name {
            font-size: 13px; font-weight: 500;
            letter-spacing: -0.1px; color: var(--text);
        }
        .exp-paidby {
            font-size: 10px; color: var(--subtle);
            font-weight: 400; margin-top: 1px;
        }
        .cat-tag {
            display: inline-block;
            padding: 2px 8px; border-radius: 5px;
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase;
        }
        .tag-Lodging   { background: #eef2ff; color: #4f46e5; }
        .tag-Food      { background: #fff1f2; color: #e11d48; }
        .tag-Transport { background: #f0fdf4; color: #059669; }
        .tag-Activity  { background: #fffbeb; color: #d97706; }

        .exp-amount {
            font-family: 'DM Mono', monospace;
            font-size: 13px; font-weight: 500;
            color: var(--text); text-align: right;
        }
        .exp-split {
            font-family: 'DM Mono', monospace;
            font-size: 10px; color: var(--color-lodging);
            font-style: italic; text-align: right;
        }
        .delete-btn {
            background: none; border: none; cursor: pointer;
            color: #d1d5db; padding: 4px 6px; border-radius: 6px;
            font-size: 13px; line-height: 1;
            transition: all 0.15s;
        }
        .delete-btn:hover { color: #ef4444; background: #fff1f2; }

        .empty-state {
            text-align: center; padding: 50px 20px;
            color: var(--subtle); font-size: 13px;
        }
        .empty-state div { font-size: 28px; margin-bottom: 8px; }

        /* ── Toast ───────────────────────────────────── */
        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: #fff;
            padding: 9px 18px; border-radius: 10px;
            font-size: 12px; font-weight: 500;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
        }
        #toast.show { opacity: 1; }

        /* ── Loader ──────────────────────────────────── */
        .loading { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     AUTH SCREEN
════════════════════════════════════════════════════ -->
<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title">Welcome back</h2>
        <p id="auth-subtitle">Sign in to access your trip</p>
        <input type="email" id="auth-email" placeholder="Email address" autocomplete="email">
        <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
        <button class="auth-btn" id="auth-submit">Sign In</button>
        <div id="auth-error"></div>
        <span id="auth-toggle">No account? <span id="auth-toggle-link">Create one</span></span>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════
     APP
════════════════════════════════════════════════════ -->
<div id="app" class="hidden">

    <!-- Topbar -->
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <span class="brand">RoamBudget</span>
            <span class="trip-badge" id="display-trip-id">—</span>
            <div class="meta-actions">
                <button id="btn-logout">Sign Out</button>
            </div>
        </div>
        <div class="total-pill">
            <span class="label">Trip Total</span>
            <span class="amount" id="total-cost">$0.00</span>
        </div>
    </div>

    <!-- Main grid -->
    <div class="grid-main">

        <!-- ── LEFT SIDEBAR ── -->
        <div class="sidebar">

            <!-- Chart + Balance Sheet -->
            <div class="card chart-card">
                <div class="chart-wrap">
                    <canvas id="budgetChart"></canvas>
                </div>
                <div class="section-label" style="margin-top:14px;">Balance Sheet</div>
                <div class="balance-list" id="settle-up-list">
                    <div style="color:var(--subtle);font-size:11px;">No expenses yet.</div>
                </div>

                <!-- Payout deep links — only shown when handles are set -->
                <div id="payout-section" style="margin-top:12px; display:none;">
                    <div class="section-label">Quick Payout</div>
                    <div class="payout-row" id="payout-links"></div>
                </div>
            </div>

            <!-- Add Expense Form -->
            <div class="card form-card">
                <h3>Post New Expense</h3>
                <form id="expense-form">
                    <input type="text" id="item_name" placeholder="Item name" required>
                    <div class="form-grid">
                        <input type="number" id="amount" step="0.01" min="0.01" placeholder="$ Price" required style="margin-bottom:0">
                        <select id="category" style="margin-bottom:0">
                            <option value="Lodging">🏨 Lodging</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">✈️ Transport</option>
                            <option value="Activity">🎟️ Activity</option>
                        </select>
                    </div>
                    <input type="text" id="paid_by" placeholder="Who paid? (exact name)" required style="margin-top:8px;">
                    <input type="number" id="split_count" min="1" placeholder="Split between how many?" required>
                    <button type="submit" class="submit-btn" id="btn-submit">Add to Trip</button>
                </form>
            </div>

        </div>

        <!-- ── RIGHT COLUMN ── -->
        <div class="right-col">

            <!-- Category summary pills -->
            <div class="cat-pills" id="category-summary"></div>

            <!-- Expense table -->
            <div class="card table-card">
                <div class="table-inner">
                    <table>
                        <thead>
                            <tr>
                                <th>Expense</th>
                                <th>Category</th>
                                <th style="text-align:right;">Amount</th>
                                <th style="text-align:right; width:40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════════════ -->
<script>
// ── CONFIG ─────────────────────────────────────────────────────────
// REPLACE these with your real values (or load from a .env build step)
const SB_URL  = "https://nlxpcmogqbbmpnowfwhi.supabase.co";
const SB_KEY  = "YOUR_SUPABASE_ANON_KEY";   // ← replace
const API_URL = "https://roambudget-server.onrender.com/expenses";

// Optional: Venmo/CashApp handles for the Quick Payout feature.
// Set to null to hide the section.
// Format: { "Alice": { venmo: "alice-venmo", cashapp: "$AliceCash" }, ... }
const PAYOUT_HANDLES = null;

// ── CATEGORY COLOR MAP (position-independent) ───────────────────────
const CAT_COLORS = {
    Lodging:   "#6366f1",
    Food:      "#f43f5e",
    Transport: "#10b981",
    Activity:  "#f59e0b",
};

// ── INIT ────────────────────────────────────────────────────────────
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
let myChart = null;
let currentTripId = localStorage.getItem("roam_trip_id") || "JAMAICA2026";
let isSignUp = false;

document.getElementById("display-trip-id").textContent = currentTripId;

// ── TOAST ───────────────────────────────────────────────────────────
function toast(msg, duration = 2400) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), duration);
}

// ── AUTH GUARD ──────────────────────────────────────────────────────
async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        showApp();
        fetchExpenses();
    }
    // else auth screen stays visible
}

function showApp() {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
}

// ── AUTH LOGIC ──────────────────────────────────────────────────────
document.getElementById("auth-submit").addEventListener("click", async () => {
    const email    = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const errEl    = document.getElementById("auth-error");
    errEl.textContent = "";

    if (!email || !password) { errEl.textContent = "Please fill in both fields."; return; }

    const fn = isSignUp
        ? supabaseClient.auth.signUp({ email, password })
        : supabaseClient.auth.signInWithPassword({ email, password });

    const { error } = await fn;
    if (error) { errEl.textContent = error.message; return; }

    if (isSignUp) {
        errEl.style.color = "#16a34a";
        errEl.textContent = "Check your email to confirm your account.";
    } else {
        showApp();
        fetchExpenses();
    }
});

document.getElementById("auth-toggle").addEventListener("click", () => {
    isSignUp = !isSignUp;
    document.getElementById("auth-title").textContent    = isSignUp ? "Create account"   : "Welcome back";
    document.getElementById("auth-subtitle").textContent = isSignUp ? "Join your trip"   : "Sign in to access your trip";
    document.getElementById("auth-submit").textContent   = isSignUp ? "Sign Up"          : "Sign In";
    document.getElementById("auth-toggle-link").textContent = isSignUp ? "Sign in instead" : "Create one";
    document.getElementById("auth-error").textContent = "";
});

document.getElementById("btn-logout").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    location.reload();
});

// ── FETCH & RENDER ──────────────────────────────────────────────────
async function fetchExpenses() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return; // guard

    try {
        const res = await fetch(`${API_URL}/${currentTripId}`, {
            headers: { "Authorization": `Bearer ${session.access_token}` }
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        if (Array.isArray(data)) renderUI(data);
    } catch (err) {
        toast("⚠️ Could not load expenses — " + err.message);
    }
}

function renderUI(expenses) {
    const tableBody = document.getElementById("expense-table-body");
    const settleList = document.getElementById("settle-up-list");
    const summaryDiv = document.getElementById("category-summary");
    const totalDisplay = document.getElementById("total-cost");

    tableBody.innerHTML = "";
    settleList.innerHTML = "";
    summaryDiv.innerHTML = "";

    let total = 0;
    let catTotals = {};  // { category: sum }
    let balances  = {};  // { name: net }  positive = owed money, negative = owes money

    if (expenses.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div>✈️</div>No expenses yet — add one to get started.</div></td></tr>`;
        totalDisplay.textContent = "$0.00";
        updateChart({});
        return;
    }

    expenses.forEach(exp => {
        const amt      = parseFloat(exp.amount);
        const splits   = parseInt(exp.split_count) || 1;   // ← use actual split_count, not hardcoded 3
        const perPerson = amt / splits;

        total += amt;
        catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;

        // Payer: paid full amount, owes their share → net = amt - perPerson
        balances[exp.paid_by] = (balances[exp.paid_by] || 0) + amt - perPerson;
        // Everyone else: owes their share (we don't know their names from this data,
        // so net per person is tracked when they appear as paid_by in other expenses)

        const catClass = `tag-${exp.category}`;
        // id is int8 from Supabase — store as number attribute, pass as number to delete
        tableBody.insertAdjacentHTML("beforeend", `
            <tr data-id="${exp.id}">
                <td>
                    <div class="exp-name">${escHtml(exp.item_name)}</div>
                    <div class="exp-paidby">Paid by ${escHtml(exp.paid_by)}</div>
                </td>
                <td><span class="cat-tag ${catClass}">${escHtml(exp.category)}</span></td>
                <td>
                    <div class="exp-amount">$${amt.toFixed(2)}</div>
                    <div class="exp-split">$${perPerson.toFixed(2)} / person</div>
                </td>
                <td style="text-align:right;">
                    <button class="delete-btn" onclick="deleteExpense(${exp.id})" title="Delete expense">✕</button>
                </td>
            </tr>`);
    });

    totalDisplay.textContent = `$${total.toFixed(2)}`;
    updateChart(catTotals);

    // ── Category pills ──
    for (const [cat, sum] of Object.entries(catTotals)) {
        const color = CAT_COLORS[cat] || "#6b7280";
        summaryDiv.insertAdjacentHTML("beforeend", `
            <div class="cat-pill">
                <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};margin-right:5px;vertical-align:middle;"></span>
                ${escHtml(cat)}: <span class="cat-amt" style="color:${color};">$${sum.toFixed(2)}</span>
            </div>`);
    }

    // ── Balance cards (both owed AND owes) ──
    const entries = Object.entries(balances).filter(([, v]) => Math.abs(v) > 0.005);
    if (entries.length === 0) {
        settleList.innerHTML = `<div style="color:var(--subtle);font-size:11px;">All settled up!</div>`;
    } else {
        entries.forEach(([person, bal]) => {
            const isOwed = bal > 0;
            settleList.insertAdjacentHTML("beforeend", `
                <div class="balance-card ${isOwed ? "owed" : "owes"}">
                    <span class="name">${escHtml(person)}</span>
                    <span class="val">${isOwed ? "+" : ""}$${Math.abs(bal).toFixed(2)}</span>
                </div>`);
        });
    }

    // ── Payout deep links ──
    renderPayouts(balances);
}

function renderPayouts(balances) {
    if (!PAYOUT_HANDLES) return;
    const section  = document.getElementById("payout-section");
    const linksDiv = document.getElementById("payout-links");
    linksDiv.innerHTML = "";

    // Show links for people who are OWED (others need to pay them)
    const owed = Object.entries(balances).filter(([, v]) => v > 0.005);
    if (owed.length === 0) { section.style.display = "none"; return; }

    owed.forEach(([person, amt]) => {
        const handles = PAYOUT_HANDLES[person];
        if (!handles) return;
        const fixedAmt = amt.toFixed(2);

        if (handles.venmo) {
            const url = `https://venmo.com/?txn=pay&audience=private&recipients=${encodeURIComponent(handles.venmo)}&amount=${fixedAmt}&note=RoamBudget`;
            linksDiv.insertAdjacentHTML("beforeend", `<a href="${url}" target="_blank" class="payout-btn">💙 Venmo ${person}</a>`);
        }
        if (handles.cashapp) {
            const handle = handles.cashapp.startsWith("$") ? handles.cashapp.slice(1) : handles.cashapp;
            const url = `https://cash.app/$${handle}/${fixedAmt}`;
            linksDiv.insertAdjacentHTML("beforeend", `<a href="${url}" target="_blank" class="payout-btn">💚 Cash App</a>`);
        }
    });

    section.style.display = linksDiv.children.length > 0 ? "block" : "none";
}

// ── CHART (position-independent color mapping) ──────────────────────
function updateChart(catTotals) {
    const ctx = document.getElementById("budgetChart").getContext("2d");
    if (myChart) { myChart.destroy(); myChart = null; }

    const labels = Object.keys(catTotals);
    if (labels.length === 0) return;

    // Map colors by label, not by array position
    const colors = labels.map(l => CAT_COLORS[l] || "#94a3b8");

    myChart = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels,
            datasets: [{
                data: Object.values(catTotals),
                backgroundColor: colors,
                borderWidth: 0,
                hoverOffset: 8,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: "bottom",
                    labels: {
                        boxWidth: 7,
                        boxHeight: 7,
                        borderRadius: 3,
                        useBorderRadius: true,
                        font: { size: 9, weight: "600", family: "DM Sans" },
                        padding: 10,
                        color: "#6b7280",
                    }
                }
            },
            cutout: "78%",
        }
    });
}

// ── ADD EXPENSE ─────────────────────────────────────────────────────
document.getElementById("expense-form").addEventListener("submit", async e => {
    e.preventDefault();
    const btn = document.getElementById("btn-submit");
    btn.disabled = true;
    btn.textContent = "Posting…";

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { toast("Not signed in."); btn.disabled = false; btn.textContent = "Add to Trip"; return; }

    const payload = {
        item_name:   document.getElementById("item_name").value.trim(),
        amount:      parseFloat(document.getElementById("amount").value),
        category:    document.getElementById("category").value,
        paid_by:     document.getElementById("paid_by").value.trim(),
        split_count: parseInt(document.getElementById("split_count").value) || 1,
        trip_id:     currentTripId,
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${session.access_token}`
            },
            body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        e.target.reset();
        toast("✓ Expense added");
        fetchExpenses();
    } catch (err) {
        toast("⚠️ " + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = "Add to Trip";
    }
});

// ── DELETE EXPENSE ──────────────────────────────────────────────────
async function deleteExpense(id) {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;

    // Optimistic: remove row immediately
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (row) row.style.opacity = "0.3";

    try {
        const res = await fetch(`${API_URL}/${id}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${session.access_token}` }
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        toast("Expense removed");
        fetchExpenses();
    } catch (err) {
        toast("⚠️ Delete failed — " + err.message);
        if (row) row.style.opacity = "1";
    }
}

// ── UTIL ────────────────────────────────────────────────────────────
function escHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

// ── KICK OFF ────────────────────────────────────────────────────────
init();
</script>
