<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-lodging:   #6366f1;
            --color-food:      #f43f5e;
            --color-transport: #10b981;
            --color-activity:  #f59e0b;
            --bg:    #f4f5f7;
            --card:  #ffffff;
            --border:#e4e7ec;
            --text:  #111827;
            --muted: #6b7280;
            --subtle:#9ca3af;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; margin: 0;
        }

        /* ── Shared: screen base ─────────────────────── */
        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            transition: opacity 0.2s, transform 0.2s;
        }
        .screen.hidden { opacity: 0 !important; pointer-events: none; transform: translateY(8px); display: none !important; }

        /* ── Auth ────────────────────────────────────── */
        #auth-screen { align-items: center; justify-content: center; background: var(--bg); z-index: 50; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; width: 360px; animation: slideUp 0.35s ease-out both; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .auth-input { display: block; width: 100%; padding: 9px 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 13px; background: #f9fafb; outline: none; transition: border-color 0.15s; }
        .auth-btn { width: 100%; padding: 10px; background: var(--color-lodging); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }

        /* ── Groups Home ─────────────────────────────── */
        #groups-screen { background: var(--bg); padding: 0; z-index: 40; overflow-y: auto; }
        .groups-inner { max-width: 560px; margin: 0 auto; padding: 48px 24px 40px; }

        /* ── Dashboard (Fix for cut-off button) ───────── */
        #app-screen { background: var(--bg); padding: 16px 20px; z-index: 30; height: 100vh; display: flex; flex-direction: column; }
        .grid-main { display: grid; grid-template-columns: 300px 1fr; gap: 14px; flex-grow: 1; min-height: 0; }
        .sidebar { display: flex; flex-direction: column; gap: 12px; overflow: hidden; height: 100%; }
        
        .chart-card { padding: 16px; flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
        .chart-wrap { height: 110px; flex-shrink: 0; display: flex; justify-content: center; }

        .balance-list { flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
        .balance-list::-webkit-scrollbar { width: 3px; }
        .balance-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .form-card { padding: 14px; flex-shrink: 0; margin-top: auto; }

        /* ── UI Elements ─────────────────────────────── */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        .balance-card { display: flex; justify-content: space-between; align-items: center; padding: 8px 11px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .balance-card.owed { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .balance-card.owes { background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239; }
        .member-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .member-chip { display: flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px 3px 4px; font-size: 11px; font-weight: 500; }
        .table-inner { overflow-y: auto; flex-grow: 1; }
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 12px; opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen">
    <div class="auth-card">
        <h2 id="auth-title">Welcome back</h2>
        <p id="auth-subtitle">Sign in to access your trips</p>
        <input class="auth-input" type="email" id="auth-email" placeholder="Email address">
        <input class="auth-input" type="password" id="auth-password" placeholder="Password">
        <button class="auth-btn" id="auth-submit">Sign In</button>
        <div id="auth-error" class="text-red-500 text-[10px] mt-2 h-4"></div>
        <span id="auth-toggle" class="block text-center text-[12px] text-slate-500 mt-4 cursor-pointer">No account? <span id="auth-toggle-link" class="text-indigo-600 underline">Create one</span></span>
    </div>
</div>

<div id="profile-screen" class="screen hidden">
    <div class="auth-card text-center">
        <div id="setup-avatar-preview" class="w-16 h-16 rounded-full bg-indigo-500 flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4">?</div>
        <h2>What's your name?</h2>
        <div class="flex gap-2 justify-center mb-6" id="setup-color-swatches"></div>
        <input class="auth-input" type="text" id="setup-display-name" placeholder="Display name" maxlength="32">
        <button class="auth-btn" id="btn-save-profile">Save & Continue</button>
    </div>
</div>

<div id="groups-screen" class="screen hidden">
    <div class="groups-inner">
        <div class="groups-header">
            <span class="brand">RoamBudget</span>
            <div style="display:flex;align-items:center;gap:10px;">
                <button class="profile-btn" id="btn-open-profile" title="Edit profile">?</button>
                <button class="ghost-btn" id="btn-logout">Sign Out</button>
            </div>
        </div>
        <div class="groups-section-label">Your Trips</div>
        <div id="groups-list"></div>
        <div class="action-cards">
            <div class="action-card">
                <h4>Create Trip</h4>
                <input class="action-input" id="new-trip-code" placeholder="Trip Code">
                <button class="action-submit" id="btn-create-trip">Create</button>
            </div>
            <div class="action-card">
                <h4>Join Trip</h4>
                <input class="action-input" id="join-trip-code" placeholder="Enter Code">
                <button class="action-submit secondary" id="btn-join-trip">Join</button>
            </div>
        </div>
    </div>
</div>

<div id="app-screen" class="screen hidden">
    <div class="topbar">
        <div class="topbar-left">
            <button class="back-btn" id="btn-back">← My Trips</button>
            <span class="trip-badge" id="display-trip-id">—</span>
            <button class="ghost-btn" id="btn-logout-dash">Sign Out</button>
        </div>
        <div class="total-pill">
            <span class="label">Trip Total</span>
            <span class="amount" id="total-cost">$0.00</span>
        </div>
    </div>

    <div class="grid-main">
        <div class="sidebar">
            <div class="card chart-card">
                <div class="chart-wrap"><canvas id="budgetChart"></canvas></div>
                <div class="section-label" style="margin-top:14px;">Balance Sheet</div>
                <div class="balance-list" id="settle-up-list"></div>
            </div>
            <div class="card form-card">
                <h3>Post New Expense</h3>
                <form id="expense-form">
                    <input class="form-field" id="item_name" placeholder="Item name" required>
                    <div class="form-grid">
                        <input class="form-field" type="number" id="amount" step="0.01" placeholder="$ Price" required>
                        <select class="form-field" id="category">
                            <option value="Lodging">Lodging</option><option value="Food">Food</option>
                            <option value="Transport">Transport</option><option value="Activity">Activity</option>
                        </select>
                    </div>
                    <input class="form-field" id="paid_by" placeholder="Who paid?">
                    <input class="form-field" type="number" id="split_count" placeholder="Split between how many?" required>
                    <button type="submit" class="submit-btn" id="btn-submit">Add to Trip</button>
                </form>
            </div>
        </div>

        <div class="right-col">
            <div style="display:flex;align-items:center;gap:10px;"><span class="member-strip-label">Members</span><div class="member-strip" id="member-strip"></div></div>
            <div class="cat-pills" id="category-summary"></div>
            <div class="card table-card">
                <div class="table-inner">
                    <table class="w-full">
                        <thead><tr><th>Expense</th><th>Category</th><th style="text-align:right;">Amount</th><th></th></tr></thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const SB_URL  = "https://nlxpcmogqbbmpnowfwhi.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5seHBjbW9ncWJibXBub3dmd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTU4MTEsImV4cCI6MjA4OTQzMTgxMX0.37Eqm_8T4QfMKz3qzX6-kGFUz5xOfEIwmP6YEIp1jNQ"; 
const API_URL = "https://roambudget-server.onrender.com/expenses";

const AVATAR_COLORS = ["#6366f1","#f43f5e","#10b981","#f59e0b","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
const CAT_COLORS = { Lodging: "#6366f1", Food: "#f43f5e", Transport: "#10b981", Activity: "#f59e0b" };

const sb = supabase.createClient(SB_URL, SB_KEY);
let currentTripId = null, currentSession = null, myChart = null, isSignUp = false, currentAvatarColor = AVATAR_COLORS[0];

function showScreen(id) { ["auth-screen","profile-screen","groups-screen","app-screen"].forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id)); }
function toast(msg) { const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2500); }
function getInitials(name) { return name ? name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) : "?"; }

async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentSession = session;
        const meta = session.user.user_metadata || {};
        if (!meta.display_name) { initColorSwatches("setup"); showScreen("profile-screen"); }
        else { 
            updateProfileButtons(meta); 
            showScreen("groups-screen"); 
            loadGroups(); 
        }
    } else { showScreen("auth-screen"); }
}

function updateProfileButtons(meta) {
    const initials = getInitials(meta.display_name);
    const btn = document.getElementById("btn-open-profile");
    if (btn) { btn.textContent = initials; btn.style.background = meta.avatar_color; }
}

function initColorSwatches(context) {
    const container = document.getElementById(`${context}-color-swatches`);
    container.innerHTML = "";
    AVATAR_COLORS.forEach(c => {
        const s = document.createElement("div");
        s.className = "w-6 h-6 rounded-full cursor-pointer hover:scale-110 transition";
        s.style.background = c;
        s.onclick = () => { 
            currentAvatarColor = c;
            document.getElementById(`setup-avatar-preview`).style.background = c;
            container.querySelectorAll('div').forEach(x => x.style.border = "none");
            s.style.border = "2px solid #111827";
        };
        container.appendChild(s);
    });
}

async function signOut() { await sb.auth.signOut(); location.reload(); }
document.getElementById("btn-logout").onclick = signOut;
document.getElementById("btn-logout-dash").onclick = signOut;

async function loadMemberStrip() {
    const { data: tripRow } = await sb.from("trips").select("id").eq("trip_code", currentTripId).single();
    if (!tripRow) return;

    // BACKFILL: Update database record with current user profile name/color
    const meta = currentSession.user.user_metadata;
    await sb.from("trip_members").update({ display_name: meta.display_name, avatar_color: meta.avatar_color }).eq("trip_id", tripRow.id).eq("user_id", currentSession.user.id);

    const { data: members } = await sb.from("trip_members").select("display_name, avatar_color").eq("trip_id", tripRow.id);
    const strip = document.getElementById("member-strip");
    strip.innerHTML = "";
    members?.forEach(m => {
        strip.insertAdjacentHTML("beforeend", `<div class="member-chip"><div class="member-avatar" style="background:${m.avatar_color || '#94a3b8'}">${getInitials(m.display_name)}</div><span>${m.display_name || 'Member'}</span></div>`);
    });
}

async function loadGroups() {
    const { data } = await sb.from("trip_members").select("trip_id, trips(*)").eq("user_id", currentSession.user.id);
    const list = document.getElementById("groups-list");
    list.innerHTML = "";
    data?.forEach(row => {
        const trip = row.trips;
        list.insertAdjacentHTML("beforeend", `<div class="group-card" onclick="enterTrip('${trip.trip_code}', '${trip.name || trip.trip_code}')"><div class="group-card-left"><div class="group-card-name">${trip.name || trip.trip_code}</div><div class="group-card-meta">${trip.trip_code}</div></div><span>→</span></div>`);
    });
}

async function enterTrip(code, name) {
    currentTripId = code;
    document.getElementById("display-trip-id").textContent = name;
    if (currentSession.user.user_metadata.display_name) document.getElementById("paid_by").value = currentSession.user.user_metadata.display_name;
    showScreen("app-screen");
    fetchExpenses();
    loadMemberStrip();
}

async function fetchExpenses() {
    const res = await fetch(`${API_URL}/${currentTripId}`, { headers: {"Authorization": `Bearer ${currentSession.access_token}`} });
    const data = await res.json();
    if (Array.isArray(data)) renderUI(data);
}

function renderUI(expenses) {
    const tableBody = document.getElementById("expense-table-body"), settleList = document.getElementById("settle-up-list"), totalDisplay = document.getElementById("total-cost");
    tableBody.innerHTML = ""; settleList.innerHTML = "";
    let total = 0, catTotals = {}, balances = {};

    expenses.forEach(exp => {
        const amt = parseFloat(exp.amount), splits = parseInt(exp.split_count) || 1, perPerson = amt / splits;
        total += amt;
        catTotals[exp.category] = (catTotals[exp.category] || 0) + amt;
        if (!balances[exp.paid_by]) balances[exp.paid_by] = { paid: 0, owed: 0 };
        balances[exp.paid_by].paid += amt; balances[exp.paid_by].owed += perPerson;

        tableBody.insertAdjacentHTML("beforeend", `<tr><td><div class="font-bold text-sm">${exp.item_name}</div><div class="text-[10px] text-slate-400 font-bold">By ${exp.paid_by}</div></td><td><span class="cat-tag tag-${exp.category}">${exp.category}</span></td><td class="text-right"><div class="font-bold">$${amt.toFixed(2)}</div><div class="text-[10px] text-indigo-600 font-bold italic">$${perPerson.toFixed(2)} / person</div></td><td class="text-right">✕</td></tr>`);
    });
    totalDisplay.textContent = `$${total.toFixed(2)}`;
    
    Object.entries(balances).forEach(([name, b]) => {
        const net = b.paid - b.owed; if (Math.abs(net) < 0.1) return;
        settleList.insertAdjacentHTML("beforeend", `<div class="balance-card ${net > 0 ? 'owed' : 'owes'}"><div><div class="bname">${name}</div><div class="bsub">${net > 0 ? 'is owed' : 'owes'}</div></div><span class="bval">${net > 0 ? '+' : ''}$${net.toFixed(2)}</span></div>`);
    });
    updateChart(catTotals);
}

function updateChart(catTotals) {
    const ctx = document.getElementById("budgetChart").getContext("2d");
    if (myChart) myChart.destroy();
    const labels = Object.keys(catTotals); if (!labels.length) return;
    myChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data: Object.values(catTotals), backgroundColor: labels.map(l => CAT_COLORS[l] || "#94a3b8"), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom", labels: { boxWidth: 7, font: { size: 9, weight: '600' } } } }, cutout: "78%" }
    });
}

document.getElementById("auth-submit").onclick = async () => {
    const email = document.getElementById("auth-email").value, password = document.getElementById("auth-password").value;
    const { data, error } = isSignUp ? await sb.auth.signUp({ email, password }) : await sb.auth.signInWithPassword({ email, password });
    if (error) { document.getElementById("auth-error").textContent = error.message; return; }
    init();
};

document.getElementById("auth-toggle").onclick = () => { isSignUp = !isSignUp; document.getElementById("auth-title").textContent = isSignUp ? "Create account" : "Welcome back"; document.getElementById("auth-submit").textContent = isSignUp ? "Sign Up" : "Sign In"; };

document.getElementById("btn-save-profile").onclick = async () => {
    const name = document.getElementById("setup-display-name").value.trim();
    if (!name) return;
    await sb.auth.updateUser({ data: { display_name: name, avatar_color: currentAvatarColor } });
    init();
};

document.getElementById("btn-back").onclick = () => showScreen("groups-screen");

document.getElementById("expense-form").onsubmit = async e => {
    e.preventDefault();
    const payload = { item_name: document.getElementById("item_name").value, amount: parseFloat(document.getElementById("amount").value), category: document.getElementById("category").value, paid_by: document.getElementById("paid_by").value, split_count: parseInt(document.getElementById("split_count").value), trip_id: currentTripId };
    await fetch(API_URL, { method: "POST", headers: {"Content-Type": "application/json", "Authorization": `Bearer ${currentSession.access_token}`}, body: JSON.stringify(payload) });
    e.target.reset(); fetchExpenses();
};

init();
</script>
</body>
</html>
