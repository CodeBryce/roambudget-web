<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamBudget | Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">✈️ RoamBudget</h1>
                <p class="text-slate-500">Shared expenses for the crew.</p>
            </div>
            <div id="total-card" class="bg-indigo-600 text-white p-6 rounded-2xl shadow-xl text-center min-w-[200px]">
                <p class="text-indigo-100 text-sm uppercase font-bold">Total Trip Cost</p>
                <h2 id="total-amount" class="text-3xl font-black font-mono">$0.00</h2>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-xl font-bold mb-4 text-slate-800">Add New Expense</h3>
                    <form id="expense-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Item Name</label>
                            <input type="text" id="item_name" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700">Amount ($)</label>
                                <input type="number" id="amount" step="0.01" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700">Category</label>
                                <select id="category" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option>Lodging</option>
                                    <option>Transport</option>
                                    <option>Food</option>
                                    <option>Activity</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Paid By</label>
                            <input type="text" id="paid_by" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Split Between (People)</label>
                            <input type="number" id="split_count" value="1" min="1" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-md">
                            Add to Trip
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div id="category-chips" class="flex flex-wrap gap-2">
                    </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="p-4 text-xs uppercase font-bold text-slate-500">Item</th>
                                <th class="p-4 text-xs uppercase font-bold text-slate-500">Category</th>
                                <th class="p-4 text-xs uppercase font-bold text-slate-500 text-right">Total</th>
                                <th class="p-4 text-xs uppercase font-bold text-slate-500 text-right">Per Person</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://roambudget-server.onrender.com/expenses";

        async function fetchExpenses() {
            try {
                const response = await fetch(API_URL);
                const expenses = await response.json();
                renderUI(expenses);
            } catch (err) { console.error("Fetch error:", err); }
        }

        function renderUI(expenses) {
            const list = document.getElementById('expense-list');
            const totalDisplay = document.getElementById('total-amount');
            const chipContainer = document.getElementById('category-chips');
            
            let totalTrip = 0;
            let categories = {};

            list.innerHTML = "";
            
            expenses.forEach(item => {
                totalTrip += item.amount;
                categories[item.category] = (categories[item.category] || 0) + item.amount;

                const perPerson = item.amount / (item.split_count || 1);
                
                list.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-semibold text-slate-800">${item.item_name}<br><span class="text-xs text-slate-400 font-normal">Paid by ${item.paid_by}</span></td>
                        <td class="p-4"><span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold uppercase">${item.category}</span></td>
                        <td class="p-4 text-right font-mono font-bold text-slate-700">$${item.amount.toFixed(2)}</td>
                        <td class="p-4 text-right font-mono text-indigo-500">$${perPerson.toFixed(2)}</td>
                    </tr>
                `;
            });

            totalDisplay.innerText = `$${totalTrip.toFixed(2)}`;

            // Render Category Chips
            chipContainer.innerHTML = "";
            for (const [cat, amt] of Object.entries(categories)) {
                chipContainer.innerHTML += `
                    <div class="bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm text-sm">
                        <span class="font-bold text-slate-800">${cat}:</span> $${amt.toFixed(2)}
                    </div>
                `;
            }
        }

        // Handle Form Submit
        document.getElementById('expense-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newExpense = {
                item_name: document.getElementById('item_name').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                paid_by: document.getElementById('paid_by').value,
                split_count: parseInt(document.getElementById('split_count').value),
                is_booked: true
            };

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newExpense)
            });

            if (response.ok) {
                document.getElementById('expense-form').reset();
                fetchExpenses(); // Refresh list
            }
        });

        fetchExpenses();
    </script>
</body>
</html>
